<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#17130f">
<title>Age of Guthology — O Estandarte Roubado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
:root{
  --ink:#f4ead5;
  --muted:#b9aa92;
  --gold:#e4bd68;
  --gold-soft:#8f6b31;
  --red:#d86355;
  --red-deep:#6e2726;
  --blue:#6ba6c9;
  --blue-deep:#203f55;
  --green:#7fc28a;
  --panel:#1b1815;
  --panel-2:#27211b;
  --panel-3:#100e0c;
  --line:#514536;
  --paper:#d9c397;
  --shadow:0 18px 46px rgba(0,0,0,.34);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  margin:0;color:var(--ink);font-family:"Segoe UI",Tahoma,sans-serif;
  background:
    radial-gradient(circle at 50% -15%,rgba(214,170,86,.18),transparent 38%),
    radial-gradient(circle at 12% 55%,rgba(105,55,37,.26),transparent 34%),
    linear-gradient(135deg,#0d0c0b,#18130f 48%,#0b0a09);
  background-attachment:fixed;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.14;z-index:-1;
  background-image:repeating-linear-gradient(93deg,transparent 0 34px,rgba(255,255,255,.035) 35px,transparent 36px 71px);
}
button,select,input{font:inherit}
button{color:inherit}
button:focus-visible,select:focus-visible,input:focus-visible{outline:3px solid rgba(228,189,104,.6);outline-offset:2px}
.hidden{display:none!important}

/* ---------- Setup ---------- */
.setup-shell{max-width:1180px;margin:0 auto;padding:36px 18px 56px}
.setup-hero{text-align:center;margin-bottom:28px}
.eyebrow{text-transform:uppercase;letter-spacing:.22em;color:var(--gold);font-size:12px;font-weight:900}
.setup-hero h1,.brand-name{font-family:Georgia,"Times New Roman",serif;text-transform:uppercase}
.setup-hero h1{font-size:clamp(38px,7vw,72px);line-height:.94;letter-spacing:.08em;margin:10px 0;color:#f3dfac;text-shadow:0 3px 0 #4f3518,0 12px 35px #000}
.setup-hero h1 span{display:block;font-size:.29em;letter-spacing:.32em;color:#bdad8f;margin-top:14px;text-shadow:none}
.setup-hero p{max-width:720px;margin:18px auto 0;color:#c7bba7;font-size:16px;line-height:1.65}
.setup-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:start}
.setup-stack{display:grid;gap:18px}
.panel,.setup-card{
  border:1px solid var(--line);border-radius:16px;background:linear-gradient(145deg,rgba(39,33,27,.96),rgba(18,16,13,.97));
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.panel:before,.setup-card:before{content:"";position:absolute;inset:0;pointer-events:none;border:1px solid rgba(255,255,255,.035);border-radius:inherit}
.setup-card{padding:20px}
.setup-card h2{font:700 22px Georgia,serif;color:#f0d79e;margin:0 0 6px}
.setup-card>p{color:var(--muted);margin:0 0 16px;line-height:1.5}
.player-config{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;align-items:end;padding:12px 0;border-top:1px solid rgba(255,255,255,.07)}
.player-config:first-of-type{border-top:0}
.crest{width:48px;height:56px;display:grid;place-items:center;font-size:24px;font-weight:900;color:#f9e7c0;clip-path:polygon(50% 0,95% 18%,88% 78%,50% 100%,12% 78%,5% 18%);background:linear-gradient(180deg,#8a3c35,#481d1c)}
.crest.blue{background:linear-gradient(180deg,#457693,#1e3b4d)}
label{font-size:12px;font-weight:800;color:#bcae98;display:grid;gap:5px}
input,select{width:100%;min-width:0;border:1px solid #5c4f40;border-radius:9px;background:#100e0c;color:var(--ink);padding:10px 11px}
.deck-showcase{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin:12px 0}
.deck-tile{padding:14px;border:1px solid #5a4936;border-radius:12px;background:linear-gradient(145deg,#2c241c,#16120f);min-height:136px}
.deck-tile.raven{background:linear-gradient(145deg,#282232,#121017)}
.deck-tile.rats{background:radial-gradient(circle at 90% 10%,rgba(151,193,74,.16),transparent 38%),linear-gradient(145deg,#32301c,#15140e);border-color:#657039}
.deck-tile.viking{background:radial-gradient(circle at 90% 10%,rgba(118,191,220,.15),transparent 38%),linear-gradient(145deg,#263641,#11191e);border-color:#526d78}
.deck-tile.miku{background:radial-gradient(circle at 88% 12%,rgba(255,101,181,.16),transparent 38%),linear-gradient(145deg,#173b3d,#0d171a);border-color:#397f82}
.deck-tile .deck-icon{font-size:30px}
.deck-tile b{display:block;color:#f1dcaa;font-family:Georgia,serif;font-size:16px;margin:8px 0 5px}
.deck-tile span{color:#b7aa96;font-size:12px;line-height:1.45;display:block}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{
  border:1px solid #735c36;border-radius:10px;background:linear-gradient(180deg,#3a2d1e,#211a13);padding:10px 15px;
  font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:.15s transform,.15s filter,.15s border-color;
}
.btn:hover{filter:brightness(1.18);border-color:var(--gold);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(180deg,#c68b35,#7d4e1c);border-color:#e5bd71;color:#fff7df}
.btn.secondary{background:linear-gradient(180deg,#29465a,#172b38);border-color:#4f829f}
.btn.danger{background:linear-gradient(180deg,#61302b,#351a18);border-color:#8c4a42}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none;filter:none}
.rules-timeline{display:grid;gap:10px;margin-top:14px}
.rule-step{display:grid;grid-template-columns:38px 1fr;gap:11px;align-items:center;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:10px;background:rgba(0,0,0,.15)}
.rule-step strong{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#5f4422;color:#ffe4a8}
.rule-step b{display:block;color:#ead29d;font-size:13px}.rule-step span{color:#aa9e8d;font-size:12px;line-height:1.4}
.online-box{display:grid;grid-template-columns:1fr auto;gap:9px;margin-top:12px}
#statusLobby{min-height:22px;margin-top:12px;color:#cfc2aa;line-height:1.45}
#statusLobby .room-code{display:block;font-size:30px;letter-spacing:.22em;color:#f3d485;font-weight:900;margin:6px 0}
.micro{color:#938775;font-size:11px;line-height:1.45}

/* ---------- Game shell ---------- */
.game-shell{width:min(1600px,100%);margin:0 auto;min-height:100vh;padding:10px;display:grid;gap:10px;grid-template-rows:auto 1fr}
.topbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;border:1px solid var(--line);border-radius:13px;background:rgba(20,17,14,.95);padding:8px 11px;box-shadow:0 8px 24px rgba(0,0,0,.26)}
.brand-name{font-weight:900;color:#efd69d;letter-spacing:.13em;font-size:17px;margin-right:4px}
.status-pill{border:1px solid #4e4437;border-radius:999px;background:#0e0d0b;padding:5px 9px;color:#ac9f8b;font-size:11px;white-space:nowrap}
.status-pill b{color:#f0e3cb}.status-pill.ready{border-color:#42774d;color:#8fc89a}.status-pill.ready b{color:#a9e2b3}
.top-grow{flex:1}
.battle-layout{display:grid;grid-template-columns:218px minmax(650px,1fr) 270px;gap:10px;min-height:0;align-items:start}
.side-column{display:grid;gap:10px;position:sticky;top:10px}
.panel-title{font:700 15px Georgia,serif;color:#efd69d;padding:12px 13px 8px;letter-spacing:.04em}
.panel-body{padding:0 13px 13px}
.war-score{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center}
.score-side{text-align:center}.score-side .score-name{font-size:11px;color:#b8aa96;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score-num{font:900 34px Georgia,serif;color:#f2db9d;line-height:1;margin:5px}.score-goal{font-size:10px;color:#8f8373}.score-vs{color:#725f46;font:700 16px Georgia,serif}
.score-track{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:11px}
.score-pip{height:7px;border-radius:99px;background:#383027}.score-pip.p0{background:#b34e43}.score-pip.p1{background:#5184a1}
.reveal-steps{display:grid;gap:7px}
.reveal-step{display:grid;grid-template-columns:28px 1fr;gap:8px;padding:8px;border-radius:9px;border:1px solid rgba(255,255,255,.065);opacity:.48}
.reveal-step.live{opacity:1;border-color:#8a6b35;background:rgba(124,89,35,.17)}
.reveal-step.done{opacity:.82}.reveal-step .step-num{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;background:#3b3024;color:#e8ca8b;font-weight:900;font-size:12px}
.reveal-step b{font-size:11px;color:#dfcfb0;display:block}.reveal-step span{font-size:10px;color:#a79985;line-height:1.35;display:block;margin-top:2px}
.tips{font-size:11px;color:#ac9f8c;line-height:1.55}.tips b{color:#e0c98f}

.battle-center{display:grid;gap:8px;min-width:0}
.player-ribbon{border:1px solid var(--line);border-radius:12px;background:linear-gradient(90deg,rgba(35,26,21,.98),rgba(20,17,14,.96));padding:8px 10px;display:flex;align-items:center;gap:9px}
.player-ribbon.enemy{background:linear-gradient(90deg,rgba(20,17,14,.96),rgba(32,29,36,.98))}
.ribbon-crest{width:37px;height:42px;display:grid;place-items:center;clip-path:polygon(50% 0,95% 18%,88% 78%,50% 100%,12% 78%,5% 18%);background:#7b332e;font-size:18px}.ribbon-crest.p1{background:#315d77}
.player-meta{min-width:0}.player-meta b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.player-meta span{font-size:10px;color:#a99b87}
.ribbon-stat{border-left:1px solid rgba(255,255,255,.08);padding-left:9px;font-size:11px;color:#c8baa3;white-space:nowrap}.ribbon-stat strong{color:#f2d990;font-size:15px}
.ribbon-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.ribbon-actions .btn{padding:7px 9px;font-size:10px}
.hand-mini{display:flex;gap:4px;overflow:hidden;margin-left:5px}.mini-back{width:25px;height:34px;border-radius:4px;border:1px solid #65563f;background:repeating-linear-gradient(135deg,#422c1f 0 4px,#211710 4px 8px);box-shadow:2px 2px 5px #000}
.warlord-slot{flex:0 1 170px;min-width:145px;border:1px solid #80663f;border-radius:9px;background:linear-gradient(145deg,#332719,#17130f);padding:5px 6px;color:#ead7ad;display:grid;grid-template-columns:27px minmax(0,1fr) auto;align-items:center;gap:6px;text-align:left;cursor:pointer;position:relative;overflow:hidden}
.warlord-slot.raven{background:linear-gradient(145deg,#35283a,#17131b);border-color:#705676}.warlord-slot.rats{background:linear-gradient(145deg,#36371d,#17170e);border-color:#778044}.warlord-slot.viking{background:linear-gradient(145deg,#29424e,#121b20);border-color:#60808f}.warlord-slot.miku{background:linear-gradient(145deg,#195153,#101d20);border-color:#48a1a3}
.warlord-slot.deployable{border-color:#e6be69;box-shadow:0 0 14px rgba(230,190,105,.18)}.warlord-slot.selected{box-shadow:0 0 0 2px rgba(255,218,130,.35),0 0 18px rgba(230,190,105,.22)}.warlord-slot.deployed{border-color:#55785b}.warlord-slot.defeated{filter:grayscale(.85);opacity:.62;border-color:#75453f}
.warlord-icon{width:27px;height:34px;border-radius:6px;display:grid;place-items:center;background:rgba(0,0,0,.25);font-size:18px}.warlord-copy{min-width:0}.warlord-copy small{display:block;color:#c99f58;font-size:6px;font-weight:900;letter-spacing:.13em}.warlord-copy b{display:block;font:700 9px Georgia,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.warlord-copy span{display:block;color:#9f927f;font-size:7px;margin-top:2px}.warlord-cost{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:#142b3b;border:1px solid #75abc9;color:#d4f1ff;font-size:10px;font-weight:900}.warlord-state{font-size:7px;font-weight:900;color:#bcd4b9;text-align:right}

.board-scroll{overflow-x:auto;border-radius:15px}
.board{min-width:650px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:2px}
.location-column{min-height:438px;border:1px solid #4d4235;border-radius:15px;background:linear-gradient(180deg,rgba(27,23,20,.95),rgba(12,11,10,.96));display:grid;grid-template-rows:1fr auto 1fr;gap:6px;padding:7px;position:relative;overflow:hidden}
.location-column.control-p0{box-shadow:inset 0 0 0 1px rgba(216,99,85,.48)}.location-column.control-p1{box-shadow:inset 0 0 0 1px rgba(107,166,201,.48)}
.location-column.fog{background:radial-gradient(circle at 50% 45%,rgba(125,112,90,.13),transparent 32%),linear-gradient(180deg,#151411,#0c0b0a)}
.lane{display:flex;flex-direction:column;gap:5px;min-height:104px}
.lane-head{display:flex;justify-content:space-between;gap:6px;color:#8f8372;font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:0 2px}.lane-head strong{font-size:12px;color:#dfccaa;letter-spacing:0}
.unit-chip{width:100%;border:1px solid #554839;border-radius:9px;background:linear-gradient(90deg,#241d17,#15120f);padding:5px;display:grid;grid-template-columns:31px 1fr auto;gap:6px;text-align:left;align-items:center;cursor:pointer;color:var(--ink);min-height:48px;position:relative;overflow:hidden}
.unit-chip:hover{border-color:#9f7c43}.unit-chip.p1{background:linear-gradient(90deg,#171b21,#202b33)}.unit-chip.carrier{border-color:#e8c264;box-shadow:0 0 15px rgba(232,194,100,.19)}.unit-chip.ward{box-shadow:inset 0 0 0 1px rgba(115,187,210,.55)}.unit-chip.warlord-unit{border-color:#d5a953;box-shadow:inset 0 0 0 1px rgba(225,185,93,.32),0 0 12px rgba(225,185,93,.12)}
.unit-icon{width:31px;height:36px;border-radius:6px;display:grid;place-items:center;background:#3a2c1f;font-size:19px}.p1 .unit-icon{background:#233b4a}
.unit-copy{min-width:0}.unit-copy b{font:700 11px Georgia,serif;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.unit-copy span{font-size:8px;color:#9e917e;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.unit-power{font:900 15px Georgia,serif;color:#f4d689}.unit-power small{display:block;color:#8e816f;font:700 7px Segoe UI,sans-serif;text-transform:uppercase}
.staged-card{border:1px dashed #8a6b42;border-radius:8px;min-height:43px;background:repeating-linear-gradient(135deg,#3d2a1c 0 6px,#21170f 6px 12px);display:grid;place-items:center;color:#be9a61;font-size:17px;letter-spacing:.2em;animation:stageIn .16s ease-out}.staged-card.mine{display:grid;grid-template-columns:26px 1fr auto;letter-spacing:0;text-align:left;padding:5px;background:linear-gradient(90deg,#38291d,#1d1711);font-size:10px}.staged-card.mine span:first-child{font-size:16px}.staged-card.mine b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lane-empty{display:grid;place-items:center;min-height:45px;color:#5f5548;font-size:10px;border:1px dashed rgba(255,255,255,.055);border-radius:8px}
@keyframes stageIn{from{transform:translateY(7px);opacity:0}to{transform:none;opacity:1}}

.location-card{border:1px solid #7b633b;border-radius:12px;background:radial-gradient(circle at 50% 0,rgba(226,185,100,.2),transparent 45%),linear-gradient(160deg,#302619,#17130e);padding:8px;text-align:center;position:relative;min-height:124px;cursor:default;color:var(--ink)}
.location-card.effect-dormant{border-color:#4f493f;background:linear-gradient(160deg,#24211c,#15130f)}.location-card.effect-dormant .loc-icon,.location-card.effect-dormant .loc-effect{filter:grayscale(.65);opacity:.58}.location-card.effect-active{box-shadow:inset 0 0 18px rgba(205,159,74,.08)}
.effect-state{display:inline-flex;align-items:center;justify-content:center;border:1px solid #75613f;border-radius:999px;padding:2px 6px;margin:3px auto 1px;font-size:7px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#e8ca87;background:#302516}.effect-state.dormant{border-color:#514c43;color:#968d7e;background:#1c1a17}.effect-state.contested{border-color:#8f4d46;color:#ef9f94;background:#351b19}.effect-state.clear{border-color:#4f7a58;color:#a9d8ad;background:#1b2d20}
button.location-card{width:100%;cursor:pointer}.location-card.targetable{border-color:#f2c66b;box-shadow:0 0 0 2px rgba(242,198,107,.27),0 0 25px rgba(242,198,107,.16);animation:targetPulse 1.2s infinite}.location-card.targetable:hover{filter:brightness(1.14)}
@keyframes targetPulse{50%{box-shadow:0 0 0 4px rgba(242,198,107,.08),0 0 32px rgba(242,198,107,.25)}}
.loc-kicker{text-transform:uppercase;letter-spacing:.17em;color:#937f5d;font-size:8px}.loc-icon{font-size:25px;line-height:1.1;margin:2px}.loc-name{font:700 14px Georgia,serif;color:#f0d79b}.loc-effect{font-size:9px;color:#b8aa92;line-height:1.3;min-height:25px;margin:4px auto;max-width:190px}.loc-score{display:flex;justify-content:center;gap:12px;font:900 15px Georgia,serif}.loc-score .red{color:#e0776b}.loc-score .blue{color:#7eb7d7}.loc-result{font-size:9px;color:#cdbb97;margin-top:4px}.resistance{display:flex;justify-content:center;gap:4px;margin-top:4px}.res-token{border:1px solid #7c6543;border-radius:999px;color:#e7c988;font-size:8px;padding:2px 5px;background:#2a2118}
.flag-marker{position:absolute;top:-11px;left:50%;transform:translateX(-50%);border:1px solid #e2b95e;border-radius:999px;background:#392914;color:#ffe5a6;padding:4px 8px;font-size:10px;font-weight:900;white-space:nowrap;box-shadow:0 5px 13px rgba(0,0,0,.4)}
.fog-card{align-self:center;margin:auto;border:1px solid #50483d;border-radius:12px;width:calc(100% - 12px);min-height:124px;display:grid;place-items:center;text-align:center;color:#756b5d;background:repeating-linear-gradient(135deg,#171511 0 9px,#100f0d 9px 18px);font:700 12px Georgia,serif;letter-spacing:.08em;padding:12px}

.hand-panel{border:1px solid var(--line);border-radius:13px;background:linear-gradient(180deg,rgba(35,29,23,.98),rgba(16,14,12,.98));padding:8px;min-width:0}
.hand-header{display:flex;gap:8px;align-items:center;margin-bottom:6px}.hand-header b{font:700 13px Georgia,serif;color:#ecd59e}.hand-header span{font-size:10px;color:#9e927f}.hand-scroll{display:flex;gap:7px;overflow-x:auto;padding:8px 4px 7px;min-height:154px;align-items:stretch;scrollbar-color:#69543a #17130f}
.hand-card{flex:0 0 112px;min-height:139px;border:1px solid #67543d;border-radius:10px;background:linear-gradient(160deg,#34271c,#17120e 72%);padding:7px;color:var(--ink);cursor:pointer;position:relative;text-align:left;display:flex;flex-direction:column;gap:4px;transition:.14s transform,.14s border-color,.14s filter;overflow:hidden}
.hand-card.raven{background:linear-gradient(160deg,#302739,#141118 72%);border-color:#5b4d68}.hand-card.rats{background:linear-gradient(160deg,#35351e,#15150e 72%);border-color:#65713c}.hand-card.viking{background:linear-gradient(160deg,#29404b,#11191e 72%);border-color:#557585}.hand-card.miku{background:linear-gradient(160deg,#19484a,#0d191c 72%);border-color:#3c8b8d}.hand-card.instant{box-shadow:inset 0 0 0 1px rgba(103,221,229,.14)}.hand-card.instant:after{content:"RÁPIDA";position:absolute;right:4px;bottom:3px;color:#76dce2;font-size:6px;font-weight:900;letter-spacing:.1em}.hand-card:hover:not(:disabled){transform:translateY(-5px);border-color:#e2bd70}.hand-card.selected{transform:translateY(-7px);border-color:#ffd77f;box-shadow:0 0 0 2px rgba(255,215,127,.28)}.hand-card:disabled{opacity:.42;cursor:not-allowed}
.card-cost{position:absolute;top:5px;left:5px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#142b3b;border:1px solid #77afd0;color:#c8ecff;font-weight:900;z-index:2}
.card-art{height:58px;border-radius:7px;background:radial-gradient(circle at 50% 30%,rgba(255,224,157,.24),transparent 35%),linear-gradient(145deg,#67482b,#21170f);display:grid;place-items:center;font-size:31px;border:1px solid rgba(255,255,255,.09)}.raven .card-art{background:radial-gradient(circle at 50% 30%,rgba(201,176,255,.17),transparent 35%),linear-gradient(145deg,#493b5c,#19141e)}.rats .card-art{background:radial-gradient(circle at 50% 30%,rgba(196,232,109,.2),transparent 36%),linear-gradient(145deg,#59602b,#1a1a10)}.viking .card-art{background:radial-gradient(circle at 50% 30%,rgba(184,229,247,.2),transparent 36%),linear-gradient(145deg,#365c6d,#101c22)}.miku .card-art{background:radial-gradient(circle at 44% 25%,rgba(255,137,203,.24),transparent 34%),linear-gradient(145deg,#167a7d,#102229)}

  if(!unit||value<=0)return 0;if(hasWard(unit)){queueUnitVisual('resist',unit);log(CARDS[unit.id].name+' resistiu à quebra de Escudo.');return 0;}

}
function weakenDefense(unit,value){

}
function applyLocationEntry(pi,unit,loc){
  if(!locationEffectActive(loc))return;
  const id=state.locations[loc].id,allies=unitsAt(pi,loc),enemies=unitsAt(other(pi),loc),arrivals=allies.filter(u=>u.enteredTurn===state.turno);
  if(id==='bridge'&&arrivals.length===1)addPermanentAttack(unit,1);
  if(id==='chapel'&&arrivals.length===1)addPermanentDefense(unit,1);
  if(id==='market'&&allies.length===1){addPermanentAttack(unit,1);addPermanentDefense(unit,1);}
  if(id==='tower'&&allies.length<=enemies.length)addPermanentDefense(unit,1);

function moveUnit(pi,unit,destination,enemyEffect=false,adjacentOnly=false,cardMovement=false){
  if(!unit||unit.loc===destination||!locationOpen(destination))return false;if(adjacentOnly&&Math.abs(unit.loc-destination)!==1)return false;if(cardMovement&&state.mission.flag.carrierUid===unit.uid)return false;
  if(enemyEffect&&hasWard(unit)){log(CARDS[unit.id].name+' não pôde ser movido.');return false;}if(unitsAt(pi,destination).length>=LOCATION_CAP)return false;
  const from=unit.loc;unit.loc=destination;unit.movedTurn=state.turno;if(cardMovement)unit.actedTurn=state.turno;queueVisual('move',{pi,uid:unit.uid,fromLoc:from,toLoc:destination,loc:destination});if(locationEffectActive(destination)&&state.locations[destination].id==='forest')addPermanentAttack(unit,1);if(state.mission.flag.carrierUid===unit.uid)state.mission.flag.loc=destination;return true;
}
function otherOpenLocationWithFewest(pi,from,adjacentOnly=false){return state.locations.map((loc,index)=>({loc,index,count:unitsAt(pi,index).length})).filter(x=>locationOpen(x.index)&&x.index!==from&&(!adjacentOnly||Math.abs(x.index-from)===1)&&x.count<LOCATION_CAP).sort((a,b)=>a.count-b.count||Math.abs(a.index-from)-Math.abs(b.index-from))[0]?.index;}

function findUnit(pi,uid){return state.players[pi].units.find(unit=>unit.uid===uid)||null;}
function legalAttackTargets(pi,uid){const attacker=findUnit(pi,uid);if(!attacker||!unitReady(attacker))return [];return unitsAt(other(pi),attacker.loc);}
function startAttack(pi,uid){if(!canAct(pi))return;const unit=findUnit(pi,uid);if(!unit||!unitReady(unit)||!legalAttackTargets(pi,uid).length)return;selection={type:'attack',pi,uid};inspect={type:'unit',id:unit.id,pi,uid};render();}
function damageResult(unit,damage){const raw=Math.max(0,damage),prevented=Math.min(raw,CARDS[unit.id]?.damageReduction||0),total=raw-prevented;return {raw,prevented,total};}
function applyDamage(unit,damage){const result=damageResult(unit,damage);let remaining=result.total,shieldHit=Math.min(unit.shield||0,remaining);unit.shield-=shieldHit;remaining-=shieldHit;const hpHit=Math.min(Math.max(0,unit.hp),remaining);unit.hp-=remaining;return {...result,shieldHit,hpHit,dies:unit.hp<=0};}
function defeatUnit(ownerPi,unit,killerPi){
  if(!unit)return;const loc=unit.loc,card=CARDS[unit.id],owner=state.players[ownerPi],killer=state.players[killerPi],bounty=card.bounty||1;queueVisual('death',{pi:ownerPi,uid:unit.uid,loc,killerPi,icon:card.icon,name:card.name,bounty,delay:430});owner.units=owner.units.filter(candidate=>candidate.uid!==unit.uid);if(unit.isWarlord){owner.warlord.status='defeated';owner.warlord.uid=null;}else owner.discard.push(unit.id);killer.kills+=bounty;
  recordAction(killerPi,'death','💀',card.name+' eliminado',killer.name+' marcou '+bounty+' Baixa'+(bounty>1?'s':'')+' em '+slotLabel(loc),unit.id);log('💀 '+killer.name+' derrotou '+card.name+' de '+owner.name+' e marcou '+bounty+' Baixa'+(bounty>1?'s':'')+'. Total: '+killer.kills+'.');
  if(state.mission.flag.carrierUid===unit.uid){state.mission.flag.status='ground';state.mission.flag.loc=loc;state.mission.flag.carrierUid=null;queueVisual('flag',{loc,label:'DERRUBADA',banner:'BANDEIRA DERRUBADA',delay:650});recordAction(ownerPi,'flag','⚑','Bandeira derrubada',slotLabel(loc));log('⚑ O portador caiu e a Bandeira ficou em '+slotLabel(loc)+'.');}
}
function checkKillVictory(){
  const reached=[0,1].filter(pi=>state.players[pi].kills>=KILL_GOAL);if(!reached.length)return false;
  if(reached.length===2){state.gameOver={winner:null,title:'Empate sangrento',reason:'Os dois exércitos alcançaram 10 Baixas no mesmo duelo.'};}
  else{const winner=reached[0];state.gameOver={winner,title:'Vitória por Deathmatch',reason:state.players[winner].name+' causou 10 Baixas inimigas.'};}
  state.phase='ended';return true;
}
function executeAttack(pi,attackerUid,targetUid){
  if(!canAct(pi)||!selection||selection.type!=='attack'||selection.uid!==attackerUid)return;const attacker=findUnit(pi,attackerUid),target=findUnit(other(pi),targetUid);if(!attacker||!target||target.loc!==attacker.loc||!unitReady(attacker))return;
  const attackerRage=rageBonus(attacker),targetRage=rageBonus(target);if(attackerRage)queueVisual('rage',{pi,uid:attacker.uid,loc:attacker.loc,amount:attackerRage});if(targetRage)queueVisual('rage',{pi:other(pi),uid:target.uid,loc:target.loc,amount:targetRage});
  const attackDamage=attackValue(pi,attacker),counterDamage=attackValue(other(pi),target);attacker.actedTurn=state.turno;
  attacker.nextCombatBonus=0;target.nextCombatBonus=0;
  const targetDamage=applyDamage(target,attackDamage),sourceDamage=applyDamage(attacker,counterDamage);queueVisual('combat',{sourcePi:pi,sourceUid:attacker.uid,targetPi:other(pi),targetUid:target.uid,loc:attacker.loc,targetDamage,sourceDamage});
  const dealtText=targetDamage.total+(targetDamage.prevented?' ('+targetDamage.prevented+' reduzido)':''),returnedText=sourceDamage.total+(sourceDamage.prevented?' ('+sourceDamage.prevented+' reduzido)':'');recordAction(pi,'attack','⚔️',CARDS[attacker.id].name+' atacou '+CARDS[target.id].name,dealtText+' dano ↔ '+returnedText+' contra-ataque · '+slotLabel(attacker.loc),attacker.id);
  log('⚔️ '+CARDS[attacker.id].name+' causou '+dealtText+'; '+CARDS[target.id].name+' revidou '+returnedText+'.');
  if(targetDamage.dies)defeatUnit(other(pi),target,pi);if(sourceDamage.dies)defeatUnit(pi,attacker,other(pi));selection=null;
  if(checkKillVictory()){commitAndSync();return;}finishAction(pi);
}

function isCarrier(unit){return !!unit&&state.mission.flag.carrierUid===unit.uid;}
function carrierBlockers(pi,unit){return isCarrier(unit)?unitsAt(other(pi),unit.loc).length:0;}
function startMove(pi,uid){if(!canAct(pi))return;const unit=findUnit(pi,uid);if(!unit||!unitReady(unit)||carrierBlockers(pi,unit)>0)return;selection={type:'move',pi,uid};inspect={type:'unit',id:unit.id,pi,uid};render();}
function legalMoveDestination(pi,unit,loc){return !!(unit&&locationOpen(loc)&&Math.abs(unit.loc-loc)===1&&unitsAt(pi,loc).length<LOCATION_CAP&&carrierBlockers(pi,unit)===0);}
function executeMove(pi,uid,loc){
  if(!canAct(pi)||!selection||selection.type!=='move'||selection.uid!==uid)return;const unit=findUnit(pi,uid);if(!legalMoveDestination(pi,unit,loc))return;const from=unit.loc;unit.actedTurn=state.turno;if(!moveUnit(pi,unit,loc,false,true))return;
  recordAction(pi,'move','🥾',CARDS[unit.id].name+' marchou',slotLabel(from)+' → '+slotLabel(loc),unit.id);log('🥾 '+CARDS[unit.id].name+' moveu para '+slotLabel(loc)+'.');selection=null;finishAction(pi);
}

function objectiveEnemies(pi,loc){return unitsAt(other(pi),loc).length;}
function flagInteractionState(pi,unit){
  if(!state.mission.active||!unit)return null;const mission=state.mission,flag=mission.flag;let action=null;
  if(pi===mission.attacker&&flag.status==='ground'&&unit.loc===flag.loc)action='steal';
  else if(pi===mission.attacker&&flag.status==='carried'&&flag.carrierUid===unit.uid&&unit.loc===mission.extraction)action='extract';
  else if(pi===mission.defender&&flag.status==='ground'&&flag.loc!==mission.home&&unit.loc===flag.loc)action='recover';
  if(!action)return null;const enemies=objectiveEnemies(pi,unit.loc),ready=unitReady(unit),requiresClear=action!=='steal',allowed=ready&&(!requiresClear||enemies===0);
  return {action,enemies,ready,requiresClear,allowed,reason:!ready?'Unidade exausta':requiresClear&&enemies?enemies+' inimigo(s) contestando o local':''};
}
function flagActionFor(pi,unit){const interaction=flagInteractionState(pi,unit);return interaction?.allowed?interaction.action:null;}
function executeFlagAction(pi,uid){
  if(!canAct(pi))return;const unit=findUnit(pi,uid),interaction=unit?flagInteractionState(pi,unit):null;if(!interaction?.allowed)return;const action=interaction.action;unit.actedTurn=state.turno;const flag=state.mission.flag;
  if(action==='steal'){flag.status='carried';flag.carrierUid=unit.uid;queueVisual('flag',{pi,uid:unit.uid,loc:unit.loc,label:'ROUBADA',banner:'BANDEIRA ROUBADA'});recordAction(pi,'flag','⚑',CARDS[unit.id].name+' roubou a Bandeira',slotLabel(unit.loc));log('⚑ '+CARDS[unit.id].name+' agora carrega a Bandeira.');}
  if(action==='recover'){
    flag.status='ground';flag.loc=state.mission.home;flag.carrierUid=null;queueVisual('flag',{pi,uid:unit.uid,loc:flag.loc,locationOnly:true,label:'RECUPERADA',banner:'BANDEIRA RECUPERADA'});recordAction(pi,'flag','🛡️','Bandeira recuperada','Voltou para '+slotLabel(flag.loc));log('🛡️ O Guardião devolveu a Bandeira ao ponto inicial.');

  }

/* ---------- PeerJS ---------- */
function roomCode(){const alphabet='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let out='';for(let i=0;i<5;i++)out+=alphabet[Math.floor(Math.random()*alphabet.length)];return out;}
function setLobbyStatus(html){lobbyStatus=html;const el=$('#statusLobby');if(el)el.innerHTML=html;}
function hasPeer(){if(typeof Peer==='undefined'){setLobbyStatus('O modo online precisa de internet para carregar o PeerJS.');return false;}return true;}
function closeNetwork(){try{if(conn)conn.close();}catch{}try{for(const c of conns)c.close();}catch{}try{if(peer)peer.destroy();}catch{}peer=null;conn=null;conns=[];}
function sendNetwork(message,except=null){if(mode==='host'){for(const c of conns)if(c!==except&&c.open)c.send(message);}else if(mode==='guest'&&conn?.open)conn.send(message);}
function sync(except=null){if(online())sendNetwork({t:'state',protocol:PROTOCOL_VERSION,state},except);render();}
function applyRemoteState(remote){
  if(!remote||typeof remote!=='object')return;if(state&&(remote.revision||0)<(state.revision||0))return;
  state=remote;selection=null;inspect=null;render();
}
function createRoom(){
  if(!hasPeer())return;closeNetwork();const code=roomCode();setLobbyStatus('Erguendo a sala...');
  peer=new Peer(ROOM_PREFIX+code,{debug:0});
  peer.on('open',()=>{mode='host';myIndex=0;setLobbyStatus('Sala criada. Envie este código:<span class="room-code">'+code+'</span>Aguardando o segundo jogador...');});
  peer.on('connection',c=>{
    if(state||conns.length>=1){c.on('open',()=>c.close());return;}conns=[c];
    c.on('data',message=>receiveGuest(c,message));c.on('close',()=>disconnected('O segundo jogador se desconectou.'));
  });
  peer.on('error',error=>setLobbyStatus('Erro ao criar sala: '+esc(error.type)+'.'));
}
function receiveGuest(c,message){
  if(!message||typeof message!=='object')return;
  if(message.t==='hello'&&!state){
    if(message.protocol!==PROTOCOL_VERSION){c.send({t:'version-error'});c.close();return;}
    const guestDeck=DECKS[message.deckId]?message.deckId:'raven';
    resetVisualRuntime();
    state=createState($('#p1Deck').value,guestDeck,cleanName($('#p1Name').value,'Jogador 1'),cleanName(message.name,'Jogador 2'),true,$('#roleMode').value);
    log('A partida online começou. Cada ação será pública e alternada.');startRound(1);
    c.send({t:'init',protocol:PROTOCOL_VERSION,state,index:1});setLobbyStatus('');render();
  }else if(message.t==='state'&&state&&message.protocol===PROTOCOL_VERSION){applyRemoteState(message.state);sendNetwork({t:'state',protocol:PROTOCOL_VERSION,state},c);}
}
function joinRoom(){
  if(!hasPeer())return;closeNetwork();const code=($('#roomInput').value||'').trim().toUpperCase();if(code.length!==5){setLobbyStatus('Digite o código de 5 caracteres.');return;}
  const name=cleanName($('#p2Name').value,'Jogador 2'),deckId=$('#p2Deck').value;setLobbyStatus('Procurando a sala...');peer=new Peer({debug:0});
  peer.on('open',()=>{
    conn=peer.connect(ROOM_PREFIX+code,{reliable:true});
    conn.on('open',()=>{mode='guest';myIndex=1;conn.send({t:'hello',protocol:PROTOCOL_VERSION,name,deckId});setLobbyStatus('Conectado. Aguardando o anfitrião...');});
    conn.on('data',message=>{
      if(!message||typeof message!=='object')return;
      if(message.t==='init'&&message.protocol===PROTOCOL_VERSION){resetVisualRuntime();state=message.state;myIndex=message.index;mode='guest';render();}
      else if(message.t==='state'&&message.protocol===PROTOCOL_VERSION)applyRemoteState(message.state);
      else if(message.t==='version-error')setLobbyStatus('A outra pessoa está usando uma versão diferente do protótipo.');
    });
    conn.on('close',()=>disconnected('A conexão com o anfitrião foi encerrada.'));
  });
  peer.on('error',error=>setLobbyStatus(error.type==='peer-unavailable'?'Sala não encontrada.':'Erro de conexão: '+esc(error.type)+'.'));
}
function disconnected(message){if(!state){setLobbyStatus(message);return;}log(message);state.connectionLost=message;state.phase='disconnected';render();}
function resetGame(){closeNetwork();resetVisualRuntime();state=null;mode='local';myIndex=null;lobbyStatus='';selection=null;inspect=null;render();}

    if(unit.attackPerm)status+=' · ATQ perm. '+(unit.attackPerm>0?'+':'')+unit.attackPerm;if(unit.defPerm)status+=' · DEF perm. +'+unit.defPerm;if(unit.nextCombatBonus)status+=' · Ímpeto +'+unit.nextCombatBonus;if(rageBonus(unit))status+=' · Fúria +'+rageBonus(unit);if(unit.shield)status+=' · Escudo '+unit.shield;if(hasWard(unit))status+=' · Ward'+(unit.wardPerm?' permanente':'');if(card.damageReduction)status+=' · Reduz dano em '+card.damageReduction;if(unit.reinforced)status+=' · Reforço';if(blockers)status+=' · Interceptada por '+blockers;
    const preview=attackTarget?combatPreview(selection.pi,findUnit(selection.pi,selection.uid),unit):null,actionLabel=interaction?(interaction.action==='steal'?'Roubar':interaction.action==='recover'?'Recuperar':'Extrair'):'',objectiveButton=interaction?`<button class="unit-action ${interaction.allowed?'':'objective-blocked'}" onclick="executeFlagAction(${pi},${unit.uid})" ${!canControl||!interaction.allowed?'disabled':''} title="${esc(interaction.allowed?actionLabel:interaction.reason)}" aria-label="${esc(interaction.allowed?actionLabel:actionLabel+' bloqueado: '+interaction.reason)}">${interaction.allowed?actionLabel:'🔒 '+actionLabel}</button>`:'';
    return `<div class="unit-row"><button class="unit-chip p${pi} ${carrier?'carrier':''} ${hasWard(unit)?'ward':''} ${unit.isWarlord?'warlord-unit':''} ${attackTarget?'targetable':''} ${!ready?'exhausted':''} ${unit.enteredTurn===state.turno?'new-unit':''}" data-unit-key="${pi}:${unit.uid}" data-player="${pi}" data-unit-uid="${unit.uid}" data-loc="${loc}" onclick="${click}"><span class="unit-icon">${card.icon}</span><span class="unit-copy"><b>${unit.isWarlord?'♛ ':''}${esc(card.name)} ${carrier?'⚑':''}</b><span>${status}${preview?`<span class="attack-preview">${preview.text}</span>`:''}</span></span><span class="combat-stats"><b class="atk">⚔ ${attackValue(pi,unit)}</b><b class="def">🛡 ${defenseValue(unit)}/${maxDefense(unit)}</b></span></button><span class="unit-actions"><button class="unit-action" onclick="startAttack(${pi},${unit.uid})" ${!canAttack?'disabled':''}>Atacar</button><button class="unit-action" onclick="startMove(${pi},${unit.uid})" ${!canMove?'disabled':''} title="${carrier&&blockers?'Portador interceptado: elimine ou remova os inimigos daqui.':'Mover para um campo adjacente'}">${carrier&&blockers?'🔒 Mover':'Mover'}</button>${objectiveButton}</span></div>`;
  }).join('');return `<div class="lane" data-lane-pi="${pi}" data-loc="${loc}"><div class="lane-head"><span>${esc(p.name)}</span><strong>⚔ ${locationPower(pi,loc)}</strong></div>${unitHtml||'<div class="lane-empty">— vazio —</div>'}</div>`;
}
function locationSelectable(loc){if(!selection)return false;if(selection.type==='card'){const id=state.players[selection.pi].hand[selection.index];return canAct(selection.pi)&&legalPlayLocation(selection.pi,id,loc);}if(selection.type==='warlord')return canAct(selection.pi)&&legalWarlordLocation(selection.pi,loc);if(selection.type==='move')return canAct(selection.pi)&&legalMoveDestination(selection.pi,findUnit(selection.pi,selection.uid),loc);return false;}
function renderLocationCard(loc){const location=state.locations[loc],data=LOCATIONS[location.id],active=locationEffectActive(loc),targetable=locationSelectable(loc),flagHere=state.mission.revealed&&state.mission.flag.loc===loc,home=state.mission.home===loc,escape=state.mission.extraction===loc,defenders=escape?unitsAt(state.mission.defender,loc).length:0;const flag=flagHere?`<div class="flag-marker">${state.mission.flag.status==='carried'?'⚑ Com o portador':state.mission.active?'⚑ Bandeira no chão':'⚑ Posição escolhida'}</div>`:'';const tag=targetable?'button':'div',timing=location.activeFromRound??loc+1;let result=home?'🏰 Ponto inicial da Bandeira':'Ataques exigem alvo no mesmo local';if(escape)result=defenders?'🔒 Fuga contestada por '+defenders:'🏁 Fuga livre para extração';return `<${tag} class="location-card ${active?'effect-active':'effect-dormant'} ${targetable?'targetable':''}" data-location-card="${loc}" ${targetable?`onclick="handleLocationClick(${loc})"`:''}>${flag}<div class="loc-kicker">Campo ${loc+1} ${loc===1?'· Centro':''} ${home?'· Bastião':''} ${escape?'· Fuga':''}</div><div class="effect-state ${active?'':'dormant'}">${active?'Efeito ativo desde R'+timing:'Efeito adormecido · ativa na R'+timing}</div><div class="loc-icon">${data.icon}</div><div class="loc-name">${data.name}</div><div class="loc-effect">${data.effect}</div><div class="loc-score"><span class="red">⚔ ${locationPower(0,loc)}</span><span>×</span><span class="blue">⚔ ${locationPower(1,loc)}</span></div><div class="loc-result">${result}</div></${tag}>`;}
function renderSelectionBar(){if(!selection)return '';if(selection.type==='card'){const id=state.players[selection.pi].hand[selection.index],card=CARDS[id],cadence=card.speed==='instant'?'É Instantânea: depois de resolver, você continua agindo.':'Depois de resolver, o oponente recebe a ação.';return `<div class="selection-bar">🎯 <span><b>${esc(card.name)}</b>: escolha um local dourado. ${cadence}</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}if(selection.type==='warlord'){const card=CARDS[state.players[selection.pi].warlord.id];return `<div class="selection-bar">♛ <span><b>${esc(card.name)}</b>: escolha um local dourado com vaga. O Warlord ocupa 1 espaço, entra uma única vez e a convocação passa a ação.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}if(selection.type==='attack'){const unit=findUnit(selection.pi,selection.uid);return `<div class="selection-bar attack-mode">⚔️ <span><b>${esc(CARDS[unit.id].name)}</b>: escolha um inimigo destacado no mesmo local. A prévia mostra dano, redução e contra-ataque.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}const unit=findUnit(selection.pi,selection.uid);return `<div class="selection-bar move-mode">🥾 <span><b>${esc(CARDS[unit.id].name)}</b>: escolha um local adjacente dourado. Mover exaure a unidade.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}
function renderReviewBar(){if(state.phase!=='review')return '';const canAdvance=!online()||mode==='host';return `<div class="review-banner">📯 <span><strong>Rodada encerrada por dois passes.</strong> Confira dano, Baixas, Bandeira e Linha de Ações.</span>${canAdvance?`<button class="btn primary" onclick="nextRound()">Iniciar rodada ${state.turno+1}</button>`:'<span style="margin-left:auto">Aguardando o anfitrião…</span>'}</div>`;}
function missionStage(){const flag=state.mission.flag;if(!state.mission.revealed||state.mission.home==null)return 0;if(!state.mission.active)return 1;if(flag.status==='ground')return 2;if(flag.status==='carried')return 3;return 0;}
function renderMissionPanel(){
  const mission=state.mission;if(!mission.revealed)return `<section class="panel"><div class="panel-title">Missão da partida</div><div class="panel-body"><div class="mission-sealed"><div class="seal">?</div><b>Ordem lacrada</b><span>Será revelada na rodada 2. Os três campos já podem receber unidades.</span></div></div></section>`;
  const a=mission.attacker,d=mission.defender,stage=missionStage(),flag=mission.flag,steps=[['📜','Revelar'],['🏰','Escolher'],['⚑','Roubar'],['🏁','Extrair']];let alert=mission.home==null?'O Guardião está escolhendo publicamente uma das três posições.':'A Bandeira ativa na rodada 3.';let checklist='';
  if(mission.active&&flag.status==='ground'&&flag.loc===mission.home){const defenders=unitsAt(d,flag.loc).length;alert=defenders?'⚔ Roubo permitido sob contestação, mas o portador ficará interceptado por '+defenders+' defensor(es) até limpar ou escapar do confronto.':'O Bastião está livre. Uma unidade pronta do Ladrão pode gastar a ação Roubar.';}
  else if(mission.active&&flag.status==='ground'){const thieves=unitsAt(a,flag.loc).length,guards=unitsAt(d,flag.loc).length;alert=(thieves&&guards)?'Bandeira contestada: o Ladrão pode Roubar; o Guardião só pode Recuperar depois de limpar os inimigos.':guards?'O Guardião pode Recuperar quando sua unidade estiver pronta.':thieves?'O Ladrão pode retomar a Bandeira quando sua unidade estiver pronta.':'Bandeira caída e sem escolta.';}
  else if(mission.active&&flag.status==='carried'){const carrier=findUnit(a,flag.carrierUid),blockers=unitsAt(d,flag.loc).length,ready=carrier&&unitReady(carrier);if(flag.loc===mission.extraction){alert=blockers?'🔒 Extração bloqueada: elimine ou remova '+blockers+' inimigo(s) da fuga.':ready?'🏁 Fuga livre: o portador pode gastar a ação Extrair.':'O local está livre, mas o portador precisa estar pronto para Extrair.';checklist=`<div class="mission-checklist"><span class="ok">✓ Portador na fuga</span><span class="${ready?'ok':'blocked'}">${ready?'✓':'✗'} Portador pronto</span><span class="${blockers?'blocked':'ok'}">${blockers?'✗ '+blockers+' inimigo(s) presente(s)':'✓ Nenhum inimigo na fuga'}</span></div>`;}else alert=blockers?'🔒 Portador interceptado por '+blockers+' inimigo(s): não pode sair deste campo.':'O portador recebe −1 ATQ e pode se mover um campo adjacente por ação.';}
  return `<section class="panel"><div class="panel-title">O Estandarte Roubado</div><div class="panel-body"><div class="role-row"><div class="role-card"><small>Ladrão</small><b>${esc(state.players[a].name)}</b><span>Roubar sob pressão e limpar a fuga</span></div><div class="role-card defend"><small>Guardião</small><b>${esc(state.players[d].name)}</b><span>Contestar, interceptar e Recuperar</span></div></div>${mission.home!=null?`<div class="chosen-home"><b>🏰 Bandeira:</b> ${esc(slotLabel(mission.home))}<br><b>🏁 Fuga:</b> ${esc(slotLabel(mission.extraction))}${state.overtime?'<br><b>⏳ Prorrogação ativa</b>':''}</div>`:''}<div class="mission-copy"><b>Regra de controle:</b> Roubar é permitido mesmo com inimigos presentes. Recuperar e Extrair exigem zero inimigos. O portador tem −1 ATQ, não pode ser movido por táticas e não sai de um campo contestado.</div><div class="mission-progress">${steps.map((s,i)=>`<div class="mission-step ${i<stage?'done':''} ${i===stage?'live':''}"><strong>${s[0]}</strong>${s[1]}</div>`).join('')}</div>${checklist}<div class="mission-alert">${alert}</div></div></section>`;
}
function renderInspectPanel(){if(!inspect)return `<section class="panel"><div class="panel-title">Leitura de carta</div><div class="panel-body inspect"><div class="inspect-empty">Selecione uma carta, Warlord ou unidade. A interface mostra bônus permanentes, efeitos temporários e estado.</div></div></section>`;const card=CARDS[inspect.id];let meta=card.warlord?`♛ Warlord · ⚔ ${card.attack} · 🛡 ${card.defense} · custo ${card.cost} · recompensa 2 Baixas`:card.type==='unit'?`⚔ ${card.attack} ATQ · 🛡 ${card.defense} DEF máxima · custo ${card.cost}`:`${card.speed==='instant'?'⚡ Instantânea · mantém a ação':'✦ Feitiço · passa a ação'} · custo ${card.cost}`;let extra='';if(inspect.type==='unit'){const unit=findUnit(inspect.pi,inspect.uid);if(unit){meta=`${unit.isWarlord?'♛ Warlord · ':''}⚔ ${attackValue(inspect.pi,unit)} ATQ · 🛡 ${defenseValue(unit)}/${maxDefense(unit)} DEF · ${unitReady(unit)?'Pronta':'Exausta'}`;extra=`<br><b>Cálculo do ATQ:</b> ${esc(attackBreakdown(inspect.pi,unit))}.<br><b>Bônus permanentes:</b> ${unit.attackPerm||0} ATQ · ${unit.defPerm||0} DEF.<br>Dano persistente: ${maxDefense(unit)-unit.hp}. Escudo temporário: ${unit.shield||0}.${hasWard(unit)?'<br>✦ Ward '+(unit.wardPerm?'permanente.':'temporário.'):''}${card.damageReduction?'<br>🩸 Cada dano recebido é reduzido em '+card.damageReduction+'.':''}${unit.nextCombatBonus?'<br>🔥 O bônus será consumido quando participar do próximo combate.':''}`;}}return `<section class="panel"><div class="panel-title">Leitura de carta</div><div class="panel-body inspect"><div class="inspect-head"><div class="inspect-icon">${card.icon}</div><div><b>${esc(card.name)}</b><span>${meta}</span></div></div><div class="inspect-text">${esc(card.text)}${extra}</div></div></section>`;}
function renderLogPanel(){return `<section class="panel"><div class="panel-title">Crônica completa</div><div class="log">${state.log.map(entry=>`<div class="log-entry"><b>R${entry.round}</b> · ${esc(entry.text)}</div>`).join('')}</div></section>`;}
function renderOverlay(){
  if(state.gameOver){const winner=state.gameOver.winner;return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">${winner==null?'⚖️':winner===state.mission.attacker?'⚑':'🏰'}</div><h2>${esc(state.gameOver.title)}</h2><p>${esc(state.gameOver.reason)}</p><p>Baixas finais: ${esc(state.players[0].name)} ${state.players[0].kills} × ${state.players[1].kills} ${esc(state.players[1].name)}</p><div class="btn-row"><button class="btn primary" onclick="resetGame()">Preparar novo teste</button></div></div></div>`;}
  if(state.phase==='disconnected')return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">🔌</div><h2>Partida pausada</h2><p>${esc(state.connectionLost||'A conexão foi encerrada.')} O estado foi congelado para evitar versões divergentes.</p><div class="btn-row"><button class="btn" onclick="resetGame()">Voltar ao início</button></div></div></div>`;
  if(state.phase==='flag-choice'){const d=state.mission.defender,can=canChooseFlag(d);return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">⚑</div><h2>Onde proteger a Bandeira?</h2><p><b>${esc(state.players[d].name)}</b>, o Guardião, escolhe publicamente um campo. Todos os locais são conhecidos; seus efeitos despertam em R1, R2 e R3.</p><div class="flag-choice-grid">${[0,1,2].map(loc=>`<button class="flag-choice" onclick="chooseFlag(${d},${loc})" ${!can?'disabled':''}><span>${loc===0?'Ⅰ':loc===1?'Ⅱ':'Ⅲ'}</span>${esc(slotLabel(loc))}<small>${locationEffectActive(loc)?'efeito ativo':'efeito ativa na R'+(state.locations[loc].activeFromRound??loc+1)}</small></button>`).join('')}</div><p>${can?'A escolha e a rota oposta aparecerão no tabuleiro e na Linha de Ações.':'Aguardando o Guardião escolher…'}</p></div></div>`;}
  if(state.passPending)return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">🕯️</div><h2>Passe o dispositivo</h2><p>Agora é a ação de <b>${esc(state.players[state.vezLocal].name)}</b>.</p><div class="btn-row"><button class="btn primary" onclick="confirmPass()">Sou eu, continuar</button></div></div></div>`;
  return '';
}

render();
</script>
</body>
</html>
