  const seat=NET.mode==='local'?(G?currentActorSeat(G):null):NET.localSeat;return Number.isInteger(seat)?teamOf(seat):teamOf(G?.active??0);
}
function teamPanel(team,placement=''){
  const act = teamOf(G.active)===team && !G.over;
  const seats = teamSeats(team);
  const sideLabel = placement==='near' ? 'SEU TIME' : 'OPONENTES';
  return `<div class="team-panel ${team===0?'a':'b'} ${placement} ${act?'act':''}">
    <div class="side-caption">${sideLabel}</div>${lifeBox(team)}${ribbon(seats[0])}${ribbon(seats[1])}
  </div>`;
}

function unitEl(u){
  const c = CARDS[u.cardId]; const t = teamOf(u.owner);
  const mine = u.owner===localSeat() && isMyTurn();
  const ready = mine && canAttackWith(G, localSeat(), u.uid);
  const isSel = sel && sel.mode==='attack' && sel.uid===u.uid;
  let isTarget = false;
  if(sel && sel.mode==='attack'){
    const src = G.units.find(x=>x.uid===sel.uid);
    if(src){ const tg = attackTargets(G, src); isTarget = tg.units.includes(u.uid); }
  }
  if(sel&&sel.mode==='hero')isTarget=heroTargetUids(G,localSeat()).includes(u.uid);
  if(sel&&sel.mode==='cardTarget'){
    const entry=G.players[localSeat()]?.hand?.find(e=>e.uid===sel.cardUid),card=CARDS[cardIdOf(entry)];
    isTarget=validCardTargetUids(G,localSeat(),card).includes(u.uid)&&canPlay(G,localSeat(),sel.cardUid,undefined,u.uid);
  }
  const cls = ['unit', t===0?'teamA':'teamB', c.f, u.exhausted?'exhausted':'',(u.ward||0)>0?'warded':'',
    u.passive==='taunt'?'taunt':'', mine?'mine':'', ready?'ready':'', isSel?'selected':'', isTarget?'target':''].join(' ');
  const av = atkVal(u);
  const rage = (u.rage && u.hp<u.maxHp) ? `<span style="color:#ff9a5f;font-size:8px">+${u.rage}🪓</span>` : '';
  const shield = u.shield>0 ? `<span class="shield">🛡${u.shield}</span>` : '';
  const ward = u.ward>0 ? `<span class="shield" title="Ignora a próxima fonte de dano">✨</span>` : '';
  const reduction = u.damageReduction>0 ? `<span class="shield" title="Reduz dano em ${u.damageReduction}">↓${u.damageReduction}</span>` : '';
  const drain = u.drain>0 ? `<span class="shield" title="Dreno ${u.drain}">🩸${u.drain}</span>` : '';
  const pain = u.painAtk>0 ? `<span class="shield" title="Ao perder Vida e sobreviver: +${u.painAtk} ATQ">🌹</span>` : '';
  const fought = u.lastForcedFightRound===G.round ? `<span class="shield" title="Já iniciou uma Briga nesta rodada">⚔✓</span>` : '';
  const aria=`${c.name}, ${G.players[u.owner].name}, ataque ${av}, vida ${u.hp}${u.shield?', escudo '+u.shield:''}${u.drain?', dreno '+u.drain:''}${u.exhausted?', exausta':', pronta'}`;
  return `<button class="${cls}" data-uid="${u.uid}" data-lane="${u.lane}" aria-label="${esc(aria)}" aria-describedby="card-preview"
    onmouseenter="showCardPreview('${u.cardId}',this,${u.uid})" onmouseleave="hideCardPreview()" onfocus="showCardPreview('${u.cardId}',this,${u.uid})" onblur="hideCardPreview()"
    onclick="event.stopPropagation();onUnit(${u.uid})">
    <span class="uic">${c.icon}</span>
    <span class="uname"><b>${esc(c.name)}</b><span class="utag">${esc(G.players[u.owner].name)} · ${roleLabel(G.players[u.owner].role)}</span></span>
    <span class="ustat"><span class="atk">${av}${rage}</span><span class="hp">${u.hp}</span>${shield}${ward}${reduction}${drain}${pain}${fought}</span>
  </button>`;
}
function laneSideUnits(team, lane){
  const us = G.units.filter(u=>u.lane===lane && teamOf(u.owner)===team);
  if(!us.length) return `<div class="lane-empty">—</div>`;
  return us.map(unitEl).join('');
}
function laneEl(lane){
  const L = G.lanes[lane];
  const cardPlayable=sel?.mode==='card'&&canPlay(G,localSeat(),sel.cardUid,lane)&&!CARDS[cardIdOf(G.players[localSeat()]?.hand?.find(e=>e.uid===sel.cardUid))]?.global;
  const heroPlayable=sel?.mode==='hero'&&heroTargetLanes(G,localSeat()).includes(lane);
  const playable=!!((cardPlayable||heroPlayable)&&!G.over&&revealed&&isMyTurn());
  return `<div class="lane ${playable?'playable':''}" data-lane="${lane}" ${playable?`onclick="onLane(${lane})"`:''}>
    <div class="lane-head"><div class="lic">${L.icon}</div><div class="lname">${esc(L.name)}</div></div>
    <div class="lane-side b">${laneSideUnits(1,lane)}</div>
    <div class="lane-mid">campo de batalha</div>
    <div class="lane-side a">${laneSideUnits(0,lane)}</div>
  </div>`;
}
function boardStage(){
  const units=G.units.map(unitEl).join('');
  return `<section class="board-stage" data-board-stage aria-label="Mesa 3D interativa">
    <div class="board-accessibility">
      <h2>${esc(G.lanes[0]?.name||'Arena')}</h2>
      <p>Arraste uma carta da mão para a mesa. Use Tab para navegar pelas unidades em campo.</p>
      ${units||'<span>Nenhuma unidade em campo.</span>'}
    </div>
  </section>`;
}

function selBar(){
  if(G.over) return '';
  const actor=currentActorSeat(G),p = G.players[actor],chain=G.chain;
  const mine=isMyTurn();
  const canInspire = !chain&&mine&&G.crossPool&&!p.inspired&&p.mana-(p.tempMana||0)>=1&&(G.players[partnerOf(actor)].pendingMana||0)<2;
  const inspireBtn = G.crossPool?`<button class="btn secondary ${canInspire?'':'action-locked'}" aria-disabled="${!canInspire}" onclick="onInspire()">✨ Inspirar: +1 na próxima vez</button>`:'';
  const w=WARLORDS[p.warlordId],powerReady=!chain&&mine&&canUseHeroPower(G,actor);
  const powerBtn=`<button class="hero-btn ${powerReady?'':'locked'}" aria-disabled="${!powerReady}" title="${esc(w.power.text)}" onclick="onHero()">✦ ${esc(w.power.name)} (${w.power.cost})</button>`;
  const endBtn = mine?`<button class="btn primary" onclick="onEnd()">${chain?'Passar prioridade ✓':'Encerrar vez ⏭'}</button>`:'';
  if(NET.pending)return `<div class="selbar"><b>Validando jogada com o host...</b><div class="push"></div></div>`;
  if(!mine)return `<div class="selbar">${chain?'Pilha aberta · aguardando resposta de':'Aguardando'} <b>${esc(p.name)}</b> · ${roleLabel(p.role)} do ${teamLabel(teamOf(actor))}.
    <div class="push"><span class="net-status ${NET.status==='online'?'online':'warn'}">${NET.status==='online'?'sincronizado':'reconectando'}</span></div></div>`;
  if(NET.mode==='local'&&!revealed){
    return `<div class="selbar"><b>${esc(p.name)}</b>, revele sua mão para jogar.<div class="push">${endBtn}</div></div>`;
  }
  if(sel&&sel.mode==='cardTarget'){
    const entry=p.hand?.find(e=>e.uid===sel.cardUid),c=CARDS[cardIdOf(entry)];
    if(!c){sel=null;return selBar();}
    return `<div class="selbar"><b>${esc(c.name)}</b> — toque em uma unidade ${c.targetUnit==='enemy'?'inimiga':'aliada'} destacada.
      <div class="push"><button class="btn ghost" onclick="clearSel()">Cancelar</button>${endBtn}</div></div>`;
  }
  if(sel && sel.mode==='card'){
    const entry=p.hand?.find(e=>e.uid===sel.cardUid),c=CARDS[cardIdOf(entry)];
    if(!c){sel=null;return selBar();}
    return `<div class="selbar"><b>${esc(c.name)}</b> selecionada — ${c.global?'confirme para resolver o efeito global':'toque na arena destacada'}.
      <div class="push">${c.global?'<button class="btn primary" onclick="onGlobalCard()">Usar agora</button>':''}<button class="btn ghost" onclick="clearSel()">Cancelar</button>${endBtn}</div></div>`;
  }
  if(sel && sel.mode==='attack'){
    const u = G.units.find(x=>x.uid===sel.uid);
    const tg = u ? attackTargets(G,u) : {units:[],face:false};
    const faceBtn = tg.face ? `<button class="face-btn" onclick="onFace()">Atacar a dupla inimiga 💥</button>` : '';
    return `<div class="selbar attack"><b>${esc(CARDS[u.cardId].name)}</b> vai atacar — toque num alvo destacado${tg.face?' ou bata na vida':''}. Unidades trocam dano; ataque direto não recebe dano de volta.
      <div class="push">${faceBtn}<button class="btn ghost" onclick="clearSel()">Cancelar</button>${endBtn}</div></div>`;
  }
  if(sel&&sel.mode==='heroChoice'){
    return `<div class="selbar"><b>${esc(w.power.name)}</b> — escolha o animal a invocar.<div class="push">
      ${w.power.choices.map(x=>`<button class="hero-btn" onclick="chooseHeroChoice('${x.id}')">${x.icon} ${esc(x.label||x.name)}</button>`).join('')}
      <button class="btn ghost" onclick="clearSel()">Cancelar</button>${endBtn}</div></div>`;
  }
  if(sel&&sel.mode==='hero'){
    return `<div class="selbar"><b>${esc(w.power.name)}</b> — ${w.power.target==='lane'?'toque na arena destacada':'toque em uma unidade destacada'}.
      <div class="push"><button class="btn ghost" onclick="clearSel()">Cancelar</button>${endBtn}</div></div>`;
  }
  if(chain){
    const top=chain.stack[chain.stack.length-1],topName=top?.kind==='attack'?'ataque declarado':CARDS[top?.cardId]?.name||'efeito';
    const order=chain.order.map(seat=>G.players[seat].name).join(' → ');
    return `<div class="selbar attack"><b>Prioridade de ${esc(p.name)}</b> — ${chain.stack.length} efeito(s) na pilha; topo: <b>${esc(topName)}</b>. Jogue uma Magia Rápida ou passe. ${chain.passes}/${chain.order.length} passaram · ordem: ${esc(order)}.
      <div class="push">${endBtn}</div></div>`;
  }
  return `<div class="selbar">Vez de <b>${esc(p.name)}</b> (${roleLabel(p.role)}, ${teamLabel(teamOf(actor))}). Jogue cartas, ataque, ou encerre.
    <div class="push">${powerBtn}${inspireBtn}${endBtn}</div></div>`;
}

function handWrap(){
  const p = visibleHandPlayer();
  if(!p)return `<div class="hand-wrap"><div class="hand-empty">Escolha um assento para receber sua mão.</div></div>`;
  if(NET.mode==='local'&&!revealed){
    return `<div class="hand-wrap"><div class="hand-head"><b>Mão oculta</b><span class="who">passe o aparelho e revele para ver as cartas</span></div>
      <div class="hand-empty">🂠 A mão de ${esc(p.name)} está virada para baixo.</div></div>`;
  }
  const myTurn=isMyTurn(),hand=Array.isArray(p.hand)?p.hand:[];
  const cards = hand.map(entry=>{
    const c = CARDS[cardIdOf(entry)];
    const affordable=myTurn&&(c.targetUnit?validCardTargetUids(G,p.seat,c).some(uid=>canPlay(G,p.seat,entry.uid,undefined,uid)):c.global?canPlay(G,p.seat,entry.uid):G.lanes.some((_,l)=>canPlay(G,p.seat,entry.uid,l)));
    const isSel = sel && (sel.mode==='card'||sel.mode==='cardTarget') && sel.cardUid===entry.uid;
    const stats = c.type==='unit' ? `<div class="cstats"><b class="a">⚔${c.atk}</b><b class="d">❤${c.hp}</b></div>` : '';
    const shownCost=effectiveCardCost(G,p.seat,c);
    return `<button class="hand-card ${c.f} ${isSel?'selected':''} ${affordable?'':'locked'}" data-card-uid="${entry.uid}" aria-disabled="${!affordable}" aria-describedby="card-preview"
      onmouseenter="showCardPreview('${cardIdOf(entry)}',this)" onmouseleave="hideCardPreview()" onfocus="showCardPreview('${cardIdOf(entry)}',this)" onblur="hideCardPreview()"
      onpointerdown="beginCardDrag(event,'${entry.uid}')" onclick="onCard('${entry.uid}')" aria-label="${esc(c.name+', custo '+c.cost+'. '+c.text)}">
      <span class="cost">${shownCost}</span>
      <div class="art">${c.icon}</div>${stats}
      <div class="ctype">${c.type==='unit'?'Unidade':c.speed==='fast'?'Magia Rápida':'Magia Lenta'}</div>
      <div class="cname">${esc(c.name)}</div>
      <div class="ctext">${esc(c.text)}</div>
    </button>`;
  }).join('');
  const w=WARLORDS[p.warlordId];
  const alliedDead=(G.graveyard||[]).filter(x=>teamOf(x.owner)===teamOf(p.seat)),nextDead=alliedDead[0];
  const graveNote=w.power.kind==='pirate'?`<br>⚓ Mortos disponíveis: <b>${alliedDead.length}</b>${nextDead?` · próximo: <b>${esc(CARDS[nextDead.cardId]?.name||'desconhecido')}</b>`:' · nenhum para consumir'}`:'';
  return `<div class="hand-wrap">
    <div class="hand-head"><b>${NET.mode==='local'?'Mão de':'Sua mão ·'} ${esc(p.name)}</b><span class="who">${roleLabel(p.role)} · ${teamLabel(teamOf(p.seat))} · 🔷 ${p.mana}/${p.maxMana}${p.tempMana?' (+'+p.tempMana+' temporária)':''}</span></div>
    <div class="power-card"><b>✦ ${esc(w.power.name)} · ${w.power.cost} Mana</b> — ${esc(w.power.text)} ${p.heroSpent?'<b>(já usado)</b>':p.heroUsed?'<b>(usado nesta vez)</b>':''}${w.passive?'<br>◆ '+esc(w.passive):''}${graveNote}</div>
    <div class="hand-scroll">${cards || '<div class="hand-empty">Sem cartas na mão.</div>'}</div>
  </div>`;
}

function historyCardRef(cardId){
  const c=CARDS[cardId];if(!c)return '';
  const aria=`Ver carta ${c.name}, custo ${c.cost}. ${c.text}`;
  return `<button type="button" class="history-card-ref" aria-label="${esc(aria)}" aria-describedby="card-preview"
    onmouseenter="showCardPreview('${cardId}',this)" onmouseleave="hideCardPreview()" onfocus="showCardPreview('${cardId}',this)" onblur="hideCardPreview()"
    onclick="event.stopPropagation();toggleCardPreview('${cardId}',this)">${c.icon} ${esc(c.name)}</button>`;
}
function historyText(x){
  const raw=String(x?.text||''),c=CARDS[x?.cardId];if(!c)return esc(raw);
  // A carta é citada depois do nome do jogador; usar a última ocorrência evita
  // transformar o apelido em link quando alguém escolhe o nome de uma carta.
  const at=raw.lastIndexOf(c.name),ref=historyCardRef(x.cardId);
  return at>=0?esc(raw.slice(0,at))+ref+esc(raw.slice(at+c.name.length)):esc(raw)+` · ${ref}`;
}
function historyPanel(){
  const rows=(G.log||[]).slice(0,18).map(x=>`<div class="history-item"><b>R${x.round}</b> · ${historyText(x)}</div>`).join('');
  const total=(G.log||[]).length;return `<details class="history" ${NET.mode==='online'?'open':''}><summary>Histórico · últimas ${Math.min(total,18)} de ${total}</summary><div class="history-list">${rows||'<div class="history-item">A batalha ainda não começou.</div>'}</div></details>`;
}

function renderBoard(){
  const p = G.players[G.active];
  const priorityPlayer=G.players[currentActorSeat(G)];
  const me=NET.mode==='local'?null:G.players[NET.localSeat];
  const viewTeam=viewTeamForClient(),farTeam=1-viewTeam;
  return `<div class="shell">
    <div class="topbar">
      <span class="brand">AGE OF GUTHOLOGY · 2v2</span>
      <span class="chip">Rodada ${G.round}</span>
      <span class="chip">Arena única · ${LANE_CAP} espaços/time</span>
      <span class="chip">Catch-up: ${G.doubleCoin?'calibrado':'original'}</span>
      <span class="chip turn" role="status" aria-live="polite">▶ ${esc(p.name)} — ${roleLabel(p.role)} · ${teamLabel(teamOf(G.active))}</span>
      ${G.chain?`<span class="chip turn">⚡ Prioridade: ${esc(priorityPlayer.name)} · pilha ${G.chain.stack.length}</span>`:''}
      ${me?`<span class="net-status ${NET.status==='online'?'online':'warn'}">Sala ${esc(NET.roomCode)} · Você: ${esc(me.name)} · ${teamLabel(teamOf(me.seat))} ${roleLabel(me.role)}</span>`:''}
      <span class="spacer"></span>
      <button class="btn ghost" onclick="toggleSound()" aria-label="${soundOn?'Desligar':'Ligar'} sons">${soundOn?'🔊':'🔇'}</button>
      <button class="btn ghost" onclick="confirmNew()">${NET.mode==='host'?'Encerrar sala':NET.mode==='guest'?'Sair da sala':'Reiniciar mesa'}</button>
    </div>
    ${lobbyMessage?`<div class="notice" role="status" aria-live="polite"><span>${esc(lobbyMessage)}</span><button class="btn ghost" onclick="dismissNotice()">✕</button></div>`:''}
    ${teamPanel(farTeam,'far')}
    ${boardStage()}
    ${teamPanel(viewTeam,'near')}
    ${selBar()}
    ${handWrap()}
    ${historyPanel()}
  </div>`;
}
function dismissNotice(){lobbyMessage='';render();}

/* ---------------- INTERAÇÃO ---------------- */
function clearSel(){ sel=null; render(); }
function explainCardBlock(p,entry){
  const c=CARDS[cardIdOf(entry)];
  if(!isMyTurn())return 'Aguarde sua vez ou a prioridade para jogar cartas.';
  if(G.chain&&(c.type!=='tactic'||c.speed!=='fast'))return 'Durante uma resposta, somente Magias Rápidas podem entrar na pilha.';
  const cost=effectiveCardCost(G,p.seat,c);if(cost>p.mana)return `Faltam ${cost-p.mana} de Mana para ${c.name}.`;
  if(c.global)return c.onPlay?.k==='ratomanocu'?'Não há unidades para o Ratomanocu eliminar.':'Essa carta não pode ser usada agora.';
  if(c.type==='unit'&&G.lanes.every((_,l)=>G.units.filter(u=>u.lane===l&&teamOf(u.owner)===teamOf(p.seat)).length>=LANE_CAP))return `Seu time ocupou os ${LANE_CAP} espaços da arena.`;
  if(c.type==='tactic')return 'A arena não tem um alvo válido para esta tática.';
  return 'A arena não tem espaço livre.';
}
function beginCardDrag(event,cardUid){
  if(event?.button!=null&&event.button!==0)return;
  if(typeof battleTable3D!=='undefined')battleTable3D.beginCardDrag(event,cardUid);
}
function onCard(cardUid){
  if(typeof battleTable3D!=='undefined'&&battleTable3D.consumeSuppressedClick(cardUid))return;
  if(G.over||!revealed)return;
  const p=G.players[localSeat()],entry=p.hand?.find(e=>e.uid===cardUid);if(!entry)return;
  const c=CARDS[cardIdOf(entry)],legal=c.targetUnit?validCardTargetUids(G,p.seat,c).some(uid=>canPlay(G,p.seat,cardUid,undefined,uid)):c.global?canPlay(G,p.seat,cardUid):G.lanes.some((_,l)=>canPlay(G,p.seat,cardUid,l));
  if(!legal){lobbyMessage=explainCardBlock(p,entry);render();return;}
  const mode=c.targetUnit?'cardTarget':'card';sel=(sel&&sel.mode===mode&&sel.cardUid===cardUid)?null:{mode,cardUid};
  render();
}
function onLane(lane){
  if(sel?.mode==='card')return dispatchGameAction({type:'play',cardUid:sel.cardUid,lane});
  if(sel?.mode==='hero')return dispatchGameAction({type:'hero',lane,choice:sel.choice});
}
function onGlobalCard(){if(sel?.mode==='card')dispatchGameAction({type:'play',cardUid:sel.cardUid});}
function onHero(){
  if(!isMyTurn()){lobbyMessage='Aguarde a sua vez para usar a ação heroica.';render();return;}
  const p=G.players[localSeat()],w=WARLORDS[p.warlordId];
  if(!canUseHeroPower(G,p.seat)){
    lobbyMessage=p.heroSpent?'Essa ação heroica única já foi usada.':p.heroUsed?'A ação heroica já foi usada nesta vez.':p.mana<w.power.cost?`Faltam ${w.power.cost-p.mana} de Mana para ${w.power.name}.`:'Não há alvo válido para essa ação.';render();return;
  }
  if(w.power.choices)sel=sel?.mode==='heroChoice'?null:{mode:'heroChoice'};else sel=sel?.mode==='hero'?null:{mode:'hero'};render();
}
function chooseHeroChoice(choice){const w=WARLORDS[G.players[localSeat()].warlordId];if(!w.power.choices?.some(x=>x.id===choice))return;sel={mode:'hero',choice};render();}
function onUnit(uid){
  if(G.over || !revealed || !isMyTurn()) return;
  const u = G.units.find(x=>x.uid===uid); if(!u) return;
  if(sel?.mode==='cardTarget'){
    const entry=G.players[localSeat()]?.hand?.find(e=>e.uid===sel.cardUid),card=CARDS[cardIdOf(entry)];
    if(validCardTargetUids(G,localSeat(),card).includes(uid)&&canPlay(G,localSeat(),sel.cardUid,undefined,uid)){dispatchGameAction({type:'play',cardUid:sel.cardUid,targetUid:uid});return;}
  }
  if(sel?.mode==='hero'&&heroTargetUids(G,localSeat()).includes(uid)){dispatchGameAction({type:'hero',targetUid:uid});return;}
  // meu? entra em modo ataque
  if(u.owner===localSeat() && canAttackWith(G, localSeat(), uid)){
    sel = (sel && sel.mode==='attack' && sel.uid===uid) ? null : {mode:'attack', uid};
    render(); return;
  }
  // alvo de ataque?
  if(sel && sel.mode==='attack'){
    const src = G.units.find(x=>x.uid===sel.uid); if(!src) { sel=null; render(); return; }
    const tg = attackTargets(G, src);
    if(tg.units.includes(uid)){
      dispatchGameAction({type:'attack',uid:sel.uid,targetUid:uid});
    }
  }
}
function onFace(){
  if(!(sel && sel.mode==='attack')) return;
  dispatchGameAction({type:'attack',uid:sel.uid,targetUid:null});
}
function onInspire(){
  const p=G.players[localSeat()];
  if(!isMyTurn()){lobbyMessage='Aguarde a sua vez para Inspirar.';render();return;}
  if(p.inspired){lobbyMessage='Você já Inspirou nesta vez.';render();return;}
  if(p.mana-(p.tempMana||0)<1){lobbyMessage='Inspirar exige 1 Mana normal; a Mana temporária da Moeda não pode ser doada.';render();return;}
  if((G.players[partnerOf(p.seat)].pendingMana||0)>=2){lobbyMessage='A reserva de Inspiração do parceiro já está cheia (+2).';render();return;}
  dispatchGameAction({type:'inspire'});
}
function onEnd(){
  hideCardPreview(true);if(NET.mode==='local')revealed=false;dispatchGameAction({type:G.chain?'pass':'end'});
}
function confirmNew(){
  const question=NET.mode==='host'?'Fechar a sala para todos e voltar ao menu?':NET.mode==='guest'?'Sair desta sala? Seu time perderá por desistência.':'Reiniciar a mesa e voltar à seleção?';
  if(!confirm(question))return;
  if(NET.mode==='guest'&&NET.hostConn?.open){safeSend(NET.hostConn,netEnvelope('forfeit',{}));setTimeout(()=>{closeNetwork();G=null;sel=null;render();},100);return;}
  if(NET.mode!=='local')closeNetwork();G=null;sel=null;render();
}
function newGame(){if(NET.mode!=='local')closeNetwork();G=null;sel=null;render();}

// executa após uma ação que muda o jogo: re-render + vfx
function afterAction(){ render(); flushVFX(); }

/* pass-e-joga */
function networkPauseGate(){
  return `<div class="gate"><div class="gate-card"><div class="gate-emblem">📡</div><h2>Partida pausada</h2>
    <p>Um jogador perdeu a conexão. O assento está reservado e a batalha continua automaticamente quando ele voltar.</p>

/* ---------------- VFX (leve) ---------------- */
function spawnFloat(el, text, tone){
  if(!el) return;
  const r = el.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'vfx-float '+tone; d.textContent = text;
  d.style.left = (r.left + r.width/2) + 'px';
  d.style.top = (r.top + r.height/2) + 'px';
  document.getElementById('vfx').appendChild(d);
  setTimeout(()=>d.remove(), 1050);
}
function elUnit(uid){ return (typeof battleTable3D!=='undefined'&&battleTable3D.anchorForUid(uid))||document.querySelector(`[data-uid="${uid}"]`); }
function elLane(lane){ return (typeof battleTable3D!=='undefined'&&battleTable3D.anchorForBoard())||document.querySelector('[data-board-stage]'); }
function elLife(team){ return document.querySelector(`[data-team="${team}"]`); }
function elSeat(seat){ return document.querySelector(`[data-seat="${seat}"]`); }
function flushVFX(){
  if(!G) return;
  const evs = (G.events||[]).filter(e => (e.seq||0) > lastSeq).sort((a,b)=>a.seq-b.seq);
  if(!evs.length) return;
  lastSeq = Math.max(lastSeq, ...evs.map(e=>e.seq||0));
  let i = 0;
  for(const e of evs){
    const delay = Math.min(i*70, 350); i++;
    const at = (getEl, text, tone) => setTimeout(()=>spawnFloat(getEl(), text, tone), delay);
    if(e.type==='hit'){ at(()=>elUnit(e.uid)||elLane(e.lane), '−'+e.amount+' Vida', 'dmg'); }
    else if(e.type==='shieldhit'){ at(()=>elUnit(e.uid)||elLane(e.lane), '🛡 absorveu '+e.amount, 'shield'); }
    else if(e.type==='face'){ at(()=>elLife(e.team), '💥 −'+e.amount, 'face'); }
    else if(e.type==='heal'){ at(()=>elUnit(e.uid)||elLane(e.lane), '✚ '+e.amount, 'heal'); }
    else if(e.type==='buff'){ at(()=>elUnit(e.uid)||elLane(e.lane), '↑ '+e.amount+' ATQ', 'buff'); }
    else if(e.type==='fortify'){ at(()=>elUnit(e.uid)||elLane(e.lane), '⬟ '+e.amount+' DEF', 'buff'); }
    else if(e.type==='shield'){ at(()=>elUnit(e.uid)||elLane(e.lane), '🛡 '+e.amount, 'shield'); }
    else if(e.type==='death'){ at(()=>elLane(e.lane), '☠', 'dmg'); }
    else if(e.type==='inspire'){ at(()=>elSeat(e.to), '✨ +1 Mana', 'mana'); }
    else if(e.type==='coin'){ at(()=>elSeat(e.owner), '🪙 +'+e.amount+' Mana', 'mana'); }
    else if(e.type==='teamheal'){ at(()=>elLife(e.team), '✚ '+e.amount+' Vida', 'heal'); }
    else if(e.type==='hero'){ at(()=>elUnit(e.uid)||elLane(e.lane), '✦ Heróica!', 'buff'); }
    else if(e.type==='boardwipe'){ at(()=>document.querySelector('.lanes'), '💥 CAMPO LIMPO', 'face'); }
    else if(e.type==='ward'){at(()=>elUnit(e.uid)||elLane(e.lane),'✨ Proteção','shield');}
    else if(e.type==='wardblock'){at(()=>elUnit(e.uid)||elLane(e.lane),'✨ Dano ignorado','shield');}
    else if(e.type==='reduced'){at(()=>elUnit(e.uid)||elLane(e.lane),'↓ '+e.amount+' dano','shield');}
    else if(e.type==='assumptio'){at(()=>elUnit(e.uid)||elLane(e.lane),'Assumptio −'+e.amount,'shield');}
    else if(e.type==='ready'){at(()=>elUnit(e.uid)||elLane(e.lane),'⚡ Pronta!','buff');}
    else if(e.type==='bloodcost'){at(()=>elLife(e.team),'🩸 −'+e.amount,'dmg');}
    else if(e.type==='drain'){at(()=>elUnit(e.uid)||elLane(e.lane),'🩸 Dreno '+e.amount,'heal');}
    else if(e.type==='forcedFight'){at(()=>elLane(e.lane),'⚔ Briga!','face');}
    if(e.type==='death')setTimeout(()=>tinySound('death'),delay);
    else if(e.type==='turn')setTimeout(()=>tinySound('turn'),delay);
    if(typeof battleTable3D!=='undefined'){
      const burstTeam=e.team==null?(e.uid!=null?teamOf(G.units.find(u=>u.uid===e.uid)?.owner??0):null):e.team;
      setTimeout(()=>battleTable3D.burst(e.type,burstTeam),delay);
    }
  }
}

  }

    return {radius:15.2,height:16.8,look:0};
