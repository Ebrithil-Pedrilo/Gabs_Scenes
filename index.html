<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#17130f">
<title>Age of Guthology — O Estandarte Roubado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
:root{
  --ink:#f4ead5;
  --muted:#b9aa92;
  --gold:#e4bd68;
  --gold-soft:#8f6b31;
  --red:#d86355;
  --red-deep:#6e2726;
  --blue:#6ba6c9;
  --blue-deep:#203f55;
  --green:#7fc28a;
  --panel:#1b1815;
  --panel-2:#27211b;
  --panel-3:#100e0c;
  --line:#514536;
  --paper:#d9c397;
  --shadow:0 18px 46px rgba(0,0,0,.34);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  margin:0;color:var(--ink);font-family:"Segoe UI",Tahoma,sans-serif;
  background:
    radial-gradient(circle at 50% -15%,rgba(214,170,86,.18),transparent 38%),
    radial-gradient(circle at 12% 55%,rgba(105,55,37,.26),transparent 34%),
    linear-gradient(135deg,#0d0c0b,#18130f 48%,#0b0a09);
  background-attachment:fixed;
}
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.14;z-index:-1;
  background-image:repeating-linear-gradient(93deg,transparent 0 34px,rgba(255,255,255,.035) 35px,transparent 36px 71px);
}
button,select,input{font:inherit}
button{color:inherit}
button:focus-visible,select:focus-visible,input:focus-visible{outline:3px solid rgba(228,189,104,.6);outline-offset:2px}
.hidden{display:none!important}

/* ---------- Setup ---------- */
.setup-shell{max-width:1180px;margin:0 auto;padding:36px 18px 56px}
.setup-hero{text-align:center;margin-bottom:28px}
.eyebrow{text-transform:uppercase;letter-spacing:.22em;color:var(--gold);font-size:12px;font-weight:900}
.setup-hero h1,.brand-name{font-family:Georgia,"Times New Roman",serif;text-transform:uppercase}
.setup-hero h1{font-size:clamp(38px,7vw,72px);line-height:.94;letter-spacing:.08em;margin:10px 0;color:#f3dfac;text-shadow:0 3px 0 #4f3518,0 12px 35px #000}
.setup-hero h1 span{display:block;font-size:.29em;letter-spacing:.32em;color:#bdad8f;margin-top:14px;text-shadow:none}
.setup-hero p{max-width:720px;margin:18px auto 0;color:#c7bba7;font-size:16px;line-height:1.65}
.setup-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:start}
.setup-stack{display:grid;gap:18px}
.panel,.setup-card{
  border:1px solid var(--line);border-radius:16px;background:linear-gradient(145deg,rgba(39,33,27,.96),rgba(18,16,13,.97));
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.panel:before,.setup-card:before{content:"";position:absolute;inset:0;pointer-events:none;border:1px solid rgba(255,255,255,.035);border-radius:inherit}
.setup-card{padding:20px}
.setup-card h2{font:700 22px Georgia,serif;color:#f0d79e;margin:0 0 6px}
.setup-card>p{color:var(--muted);margin:0 0 16px;line-height:1.5}
.player-config{display:grid;grid-template-columns:52px 1fr 1fr;gap:10px;align-items:end;padding:12px 0;border-top:1px solid rgba(255,255,255,.07)}
.player-config:first-of-type{border-top:0}
.crest{width:48px;height:56px;display:grid;place-items:center;font-size:24px;font-weight:900;color:#f9e7c0;clip-path:polygon(50% 0,95% 18%,88% 78%,50% 100%,12% 78%,5% 18%);background:linear-gradient(180deg,#8a3c35,#481d1c)}
.crest.blue{background:linear-gradient(180deg,#457693,#1e3b4d)}
label{font-size:12px;font-weight:800;color:#bcae98;display:grid;gap:5px}
input,select{width:100%;min-width:0;border:1px solid #5c4f40;border-radius:9px;background:#100e0c;color:var(--ink);padding:10px 11px}
.deck-showcase{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
.deck-tile{padding:14px;border:1px solid #5a4936;border-radius:12px;background:linear-gradient(145deg,#2c241c,#16120f);min-height:136px}
.deck-tile.raven{background:linear-gradient(145deg,#282232,#121017)}
.deck-tile .deck-icon{font-size:30px}
.deck-tile b{display:block;color:#f1dcaa;font-family:Georgia,serif;font-size:16px;margin:8px 0 5px}
.deck-tile span{color:#b7aa96;font-size:12px;line-height:1.45;display:block}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.btn{
  border:1px solid #735c36;border-radius:10px;background:linear-gradient(180deg,#3a2d1e,#211a13);padding:10px 15px;
  font-weight:900;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.25);transition:.15s transform,.15s filter,.15s border-color;
}
.btn:hover{filter:brightness(1.18);border-color:var(--gold);transform:translateY(-1px)}
.btn.primary{background:linear-gradient(180deg,#c68b35,#7d4e1c);border-color:#e5bd71;color:#fff7df}
.btn.secondary{background:linear-gradient(180deg,#29465a,#172b38);border-color:#4f829f}
.btn.danger{background:linear-gradient(180deg,#61302b,#351a18);border-color:#8c4a42}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none;filter:none}
.rules-timeline{display:grid;gap:10px;margin-top:14px}
.rule-step{display:grid;grid-template-columns:38px 1fr;gap:11px;align-items:center;border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:10px;background:rgba(0,0,0,.15)}
.rule-step strong{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#5f4422;color:#ffe4a8}
.rule-step b{display:block;color:#ead29d;font-size:13px}.rule-step span{color:#aa9e8d;font-size:12px;line-height:1.4}
.online-box{display:grid;grid-template-columns:1fr auto;gap:9px;margin-top:12px}
#statusLobby{min-height:22px;margin-top:12px;color:#cfc2aa;line-height:1.45}
#statusLobby .room-code{display:block;font-size:30px;letter-spacing:.22em;color:#f3d485;font-weight:900;margin:6px 0}
.micro{color:#938775;font-size:11px;line-height:1.45}

/* ---------- Game shell ---------- */
.game-shell{width:min(1600px,100%);margin:0 auto;min-height:100vh;padding:10px;display:grid;gap:10px;grid-template-rows:auto 1fr}
.topbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;border:1px solid var(--line);border-radius:13px;background:rgba(20,17,14,.95);padding:8px 11px;box-shadow:0 8px 24px rgba(0,0,0,.26)}
.brand-name{font-weight:900;color:#efd69d;letter-spacing:.13em;font-size:17px;margin-right:4px}
.status-pill{border:1px solid #4e4437;border-radius:999px;background:#0e0d0b;padding:5px 9px;color:#ac9f8b;font-size:11px;white-space:nowrap}
.status-pill b{color:#f0e3cb}.status-pill.ready{border-color:#42774d;color:#8fc89a}.status-pill.ready b{color:#a9e2b3}
.top-grow{flex:1}
.battle-layout{display:grid;grid-template-columns:218px minmax(650px,1fr) 270px;gap:10px;min-height:0;align-items:start}
.side-column{display:grid;gap:10px;position:sticky;top:10px}
.panel-title{font:700 15px Georgia,serif;color:#efd69d;padding:12px 13px 8px;letter-spacing:.04em}
.panel-body{padding:0 13px 13px}
.war-score{display:grid;grid-template-columns:1fr auto 1fr;gap:9px;align-items:center}
.score-side{text-align:center}.score-side .score-name{font-size:11px;color:#b8aa96;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.score-num{font:900 34px Georgia,serif;color:#f2db9d;line-height:1;margin:5px}.score-goal{font-size:10px;color:#8f8373}.score-vs{color:#725f46;font:700 16px Georgia,serif}
.score-track{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:11px}
.score-pip{height:7px;border-radius:99px;background:#383027}.score-pip.p0{background:#b34e43}.score-pip.p1{background:#5184a1}
.reveal-steps{display:grid;gap:7px}
.reveal-step{display:grid;grid-template-columns:28px 1fr;gap:8px;padding:8px;border-radius:9px;border:1px solid rgba(255,255,255,.065);opacity:.48}
.reveal-step.live{opacity:1;border-color:#8a6b35;background:rgba(124,89,35,.17)}
.reveal-step.done{opacity:.82}.reveal-step .step-num{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;background:#3b3024;color:#e8ca8b;font-weight:900;font-size:12px}
.reveal-step b{font-size:11px;color:#dfcfb0;display:block}.reveal-step span{font-size:10px;color:#a79985;line-height:1.35;display:block;margin-top:2px}
.tips{font-size:11px;color:#ac9f8c;line-height:1.55}.tips b{color:#e0c98f}

.battle-center{display:grid;gap:8px;min-width:0}
.player-ribbon{border:1px solid var(--line);border-radius:12px;background:linear-gradient(90deg,rgba(35,26,21,.98),rgba(20,17,14,.96));padding:8px 10px;display:flex;align-items:center;gap:9px}
.player-ribbon.enemy{background:linear-gradient(90deg,rgba(20,17,14,.96),rgba(32,29,36,.98))}
.ribbon-crest{width:37px;height:42px;display:grid;place-items:center;clip-path:polygon(50% 0,95% 18%,88% 78%,50% 100%,12% 78%,5% 18%);background:#7b332e;font-size:18px}.ribbon-crest.p1{background:#315d77}
.player-meta{min-width:0}.player-meta b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.player-meta span{font-size:10px;color:#a99b87}
.ribbon-stat{border-left:1px solid rgba(255,255,255,.08);padding-left:9px;font-size:11px;color:#c8baa3;white-space:nowrap}.ribbon-stat strong{color:#f2d990;font-size:15px}
.ribbon-actions{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.ribbon-actions .btn{padding:7px 9px;font-size:10px}
.hand-mini{display:flex;gap:4px;overflow:hidden;margin-left:5px}.mini-back{width:25px;height:34px;border-radius:4px;border:1px solid #65563f;background:repeating-linear-gradient(135deg,#422c1f 0 4px,#211710 4px 8px);box-shadow:2px 2px 5px #000}

.board-scroll{overflow-x:auto;border-radius:15px}
.board{min-width:650px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:2px}
.location-column{min-height:438px;border:1px solid #4d4235;border-radius:15px;background:linear-gradient(180deg,rgba(27,23,20,.95),rgba(12,11,10,.96));display:grid;grid-template-rows:1fr auto 1fr;gap:6px;padding:7px;position:relative;overflow:hidden}
.location-column.control-p0{box-shadow:inset 0 0 0 1px rgba(216,99,85,.48)}.location-column.control-p1{box-shadow:inset 0 0 0 1px rgba(107,166,201,.48)}
.location-column.fog{background:radial-gradient(circle at 50% 45%,rgba(125,112,90,.13),transparent 32%),linear-gradient(180deg,#151411,#0c0b0a)}
.lane{display:flex;flex-direction:column;gap:5px;min-height:104px}
.lane-head{display:flex;justify-content:space-between;gap:6px;color:#8f8372;font-size:9px;text-transform:uppercase;letter-spacing:.1em;padding:0 2px}.lane-head strong{font-size:12px;color:#dfccaa;letter-spacing:0}
.unit-chip{width:100%;border:1px solid #554839;border-radius:9px;background:linear-gradient(90deg,#241d17,#15120f);padding:5px;display:grid;grid-template-columns:31px 1fr auto;gap:6px;text-align:left;align-items:center;cursor:pointer;color:var(--ink);min-height:48px;position:relative;overflow:hidden}
.unit-chip:hover{border-color:#9f7c43}.unit-chip.p1{background:linear-gradient(90deg,#171b21,#202b33)}.unit-chip.carrier{border-color:#e8c264;box-shadow:0 0 15px rgba(232,194,100,.19)}.unit-chip.ward{box-shadow:inset 0 0 0 1px rgba(115,187,210,.55)}
.unit-icon{width:31px;height:36px;border-radius:6px;display:grid;place-items:center;background:#3a2c1f;font-size:19px}.p1 .unit-icon{background:#233b4a}
.unit-copy{min-width:0}.unit-copy b{font:700 11px Georgia,serif;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.unit-copy span{font-size:8px;color:#9e917e;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.unit-power{font:900 15px Georgia,serif;color:#f4d689}.unit-power small{display:block;color:#8e816f;font:700 7px Segoe UI,sans-serif;text-transform:uppercase}
.staged-card{border:1px dashed #8a6b42;border-radius:8px;min-height:43px;background:repeating-linear-gradient(135deg,#3d2a1c 0 6px,#21170f 6px 12px);display:grid;place-items:center;color:#be9a61;font-size:17px;letter-spacing:.2em;animation:stageIn .16s ease-out}.staged-card.mine{display:grid;grid-template-columns:26px 1fr auto;letter-spacing:0;text-align:left;padding:5px;background:linear-gradient(90deg,#38291d,#1d1711);font-size:10px}.staged-card.mine span:first-child{font-size:16px}.staged-card.mine b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lane-empty{display:grid;place-items:center;min-height:45px;color:#5f5548;font-size:10px;border:1px dashed rgba(255,255,255,.055);border-radius:8px}
@keyframes stageIn{from{transform:translateY(7px);opacity:0}to{transform:none;opacity:1}}

.location-card{border:1px solid #7b633b;border-radius:12px;background:radial-gradient(circle at 50% 0,rgba(226,185,100,.2),transparent 45%),linear-gradient(160deg,#302619,#17130e);padding:8px;text-align:center;position:relative;min-height:124px;cursor:default;color:var(--ink)}
.location-card.effect-dormant{border-color:#4f493f;background:linear-gradient(160deg,#24211c,#15130f)}.location-card.effect-dormant .loc-icon,.location-card.effect-dormant .loc-effect{filter:grayscale(.65);opacity:.58}.location-card.effect-active{box-shadow:inset 0 0 18px rgba(205,159,74,.08)}
.effect-state{display:inline-flex;align-items:center;justify-content:center;border:1px solid #75613f;border-radius:999px;padding:2px 6px;margin:3px auto 1px;font-size:7px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#e8ca87;background:#302516}.effect-state.dormant{border-color:#514c43;color:#968d7e;background:#1c1a17}.effect-state.contested{border-color:#8f4d46;color:#ef9f94;background:#351b19}.effect-state.clear{border-color:#4f7a58;color:#a9d8ad;background:#1b2d20}
button.location-card{width:100%;cursor:pointer}.location-card.targetable{border-color:#f2c66b;box-shadow:0 0 0 2px rgba(242,198,107,.27),0 0 25px rgba(242,198,107,.16);animation:targetPulse 1.2s infinite}.location-card.targetable:hover{filter:brightness(1.14)}
@keyframes targetPulse{50%{box-shadow:0 0 0 4px rgba(242,198,107,.08),0 0 32px rgba(242,198,107,.25)}}
.loc-kicker{text-transform:uppercase;letter-spacing:.17em;color:#937f5d;font-size:8px}.loc-icon{font-size:25px;line-height:1.1;margin:2px}.loc-name{font:700 14px Georgia,serif;color:#f0d79b}.loc-effect{font-size:9px;color:#b8aa92;line-height:1.3;min-height:25px;margin:4px auto;max-width:190px}.loc-score{display:flex;justify-content:center;gap:12px;font:900 15px Georgia,serif}.loc-score .red{color:#e0776b}.loc-score .blue{color:#7eb7d7}.loc-result{font-size:9px;color:#cdbb97;margin-top:4px}.resistance{display:flex;justify-content:center;gap:4px;margin-top:4px}.res-token{border:1px solid #7c6543;border-radius:999px;color:#e7c988;font-size:8px;padding:2px 5px;background:#2a2118}
.flag-marker{position:absolute;top:-11px;left:50%;transform:translateX(-50%);border:1px solid #e2b95e;border-radius:999px;background:#392914;color:#ffe5a6;padding:4px 8px;font-size:10px;font-weight:900;white-space:nowrap;box-shadow:0 5px 13px rgba(0,0,0,.4)}
.fog-card{align-self:center;margin:auto;border:1px solid #50483d;border-radius:12px;width:calc(100% - 12px);min-height:124px;display:grid;place-items:center;text-align:center;color:#756b5d;background:repeating-linear-gradient(135deg,#171511 0 9px,#100f0d 9px 18px);font:700 12px Georgia,serif;letter-spacing:.08em;padding:12px}

.hand-panel{border:1px solid var(--line);border-radius:13px;background:linear-gradient(180deg,rgba(35,29,23,.98),rgba(16,14,12,.98));padding:8px;min-width:0}
.hand-header{display:flex;gap:8px;align-items:center;margin-bottom:6px}.hand-header b{font:700 13px Georgia,serif;color:#ecd59e}.hand-header span{font-size:10px;color:#9e927f}.hand-scroll{display:flex;gap:7px;overflow-x:auto;padding:8px 4px 7px;min-height:154px;align-items:stretch;scrollbar-color:#69543a #17130f}
.hand-card{flex:0 0 112px;min-height:139px;border:1px solid #67543d;border-radius:10px;background:linear-gradient(160deg,#34271c,#17120e 72%);padding:7px;color:var(--ink);cursor:pointer;position:relative;text-align:left;display:flex;flex-direction:column;gap:4px;transition:.14s transform,.14s border-color,.14s filter;overflow:hidden}
.hand-card.raven{background:linear-gradient(160deg,#302739,#141118 72%);border-color:#5b4d68}.hand-card:hover:not(:disabled){transform:translateY(-5px);border-color:#e2bd70}.hand-card.selected{transform:translateY(-7px);border-color:#ffd77f;box-shadow:0 0 0 2px rgba(255,215,127,.28)}.hand-card:disabled{opacity:.42;cursor:not-allowed}
.card-cost{position:absolute;top:5px;left:5px;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:#142b3b;border:1px solid #77afd0;color:#c8ecff;font-weight:900;z-index:2}
.card-art{height:58px;border-radius:7px;background:radial-gradient(circle at 50% 30%,rgba(255,224,157,.24),transparent 35%),linear-gradient(145deg,#67482b,#21170f);display:grid;place-items:center;font-size:31px;border:1px solid rgba(255,255,255,.09)}.raven .card-art{background:radial-gradient(circle at 50% 30%,rgba(201,176,255,.17),transparent 35%),linear-gradient(145deg,#493b5c,#19141e)}
.card-type{text-transform:uppercase;letter-spacing:.14em;color:#9c8b71;font-size:7px}.card-name{font:700 11px Georgia,serif;color:#f2dcaa;line-height:1.1;min-height:24px}.card-text{font-size:8px;color:#b7aa95;line-height:1.25;flex:1}.card-power{position:absolute;right:5px;top:42px;width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:#6c2d2a;border:1px solid #d97b6d;color:#fff3d7;font-weight:900}.raven .card-power{background:#2b5067;border-color:#76afd0}.tactic .card-power{background:#55426d;border-color:#9b82ba;font-size:12px}
.hand-back-row{display:flex;gap:5px;align-items:center;min-height:52px}.hand-back{width:34px;height:48px;border:1px solid #6d593d;border-radius:6px;background:repeating-linear-gradient(135deg,#442e1e 0 5px,#22170f 5px 10px);box-shadow:2px 3px 7px #000}.hand-hidden-note{font-size:10px;color:#8f8372;margin-left:6px}

/* ---------- Mission / inspector / log ---------- */
.mission-sealed{text-align:center;padding:14px 6px 8px}.mission-sealed .seal{width:66px;height:66px;margin:0 auto 11px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 38% 30%,#b85749,#6b211d 70%);border:3px double #dc8271;color:#f5c6a9;font-size:28px;box-shadow:0 8px 20px #000}.mission-sealed b{font:700 16px Georgia,serif;color:#e3c995}.mission-sealed span{display:block;color:#9e917f;font-size:10px;line-height:1.45;margin-top:5px}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}.role-card{border:1px solid #674332;border-radius:9px;padding:7px;background:rgba(103,45,37,.16)}.role-card.defend{border-color:#3f6577;background:rgba(45,82,102,.15)}.role-card small{display:block;color:#9f917e;font-size:7px;text-transform:uppercase;letter-spacing:.12em}.role-card b{font-size:10px;color:#efcf91;display:block;margin:2px 0}.role-card span{font-size:8px;color:#ac9f8d;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mission-copy{font-size:10px;line-height:1.45;color:#b9aa94}.mission-copy b{color:#efd18d}.mission-progress{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin:10px 0}.mission-step{border:1px solid #4f4436;border-radius:7px;padding:5px 2px;text-align:center;font-size:7px;color:#837867;background:#15120f}.mission-step.done{border-color:#9e7938;background:#352817;color:#f1d89c}.mission-step.live{border-color:#e0b75f;box-shadow:0 0 12px rgba(224,183,95,.2);color:#ffe4a4}.mission-step strong{display:block;font-size:14px;margin-bottom:2px}
.mission-alert{border:1px solid #806431;border-radius:8px;background:rgba(118,81,29,.2);padding:7px;color:#e6cc91;font-size:9px;line-height:1.4}
.mission-checklist{display:grid;gap:3px;margin:6px 0}.mission-checklist span{border:1px solid #4e4538;border-radius:6px;background:#171411;padding:4px 6px;font-size:8px;color:#9e927f}.mission-checklist span.ok{border-color:#46664b;color:#a9d3ad}.mission-checklist span.blocked{border-color:#75443e;color:#e49a90}
.inspect{min-height:120px}.inspect-head{display:grid;grid-template-columns:48px 1fr;gap:9px;align-items:center}.inspect-icon{width:48px;height:55px;border-radius:8px;display:grid;place-items:center;background:#3a2b1e;font-size:27px;border:1px solid #624f37}.inspect-head b{font:700 13px Georgia,serif;color:#eed59c}.inspect-head span{font-size:9px;color:#9b8f7e;display:block;margin-top:2px}.inspect-text{font-size:10px;color:#bcae99;line-height:1.45;margin-top:9px}.inspect-empty{color:#8c8171;font-size:10px;line-height:1.5;text-align:center;padding:15px 6px}

<body>
<main id="app"></main>
<script>
const $ = selector => document.querySelector(selector);
const PROTOCOL_VERSION = 6;
const ROOM_PREFIX = 'ageguthology-banner-v6-';
const MAX_ROUNDS = 8;
const KILL_GOAL = 10;
const LOCATION_CAP = 3;

const DECKS = {
  vale: {
    name:'Bastião de Valebruma', short:'Valebruma', icon:'♜', color:'vale',
    style:'Defesa flexível, formação e respostas quando está atrás.',
    cards:['vale_page','vale_scout','vale_shield','vale_spear','vale_guard','vale_sister','vale_knight','vale_marshal','vale_rally','vale_march','vale_barricade','vale_laststand']
  },
  raven: {
    name:'Companhia do Corvo', short:'Corvo', icon:'♞', color:'raven',
    style:'Mobilidade, sabotagem e explosões de poder no local da bandeira.',
    cards:['raven_rat','raven_spy','raven_blade','raven_saboteur','raven_rider','raven_duelist','raven_knight','raven_chief','raven_feint','raven_path','raven_smoke','raven_allin']
  }
};

const CARDS = {
  vale_page:{deck:'vale',name:'Pajem do Portão',type:'unit',cost:1,attack:1,defense:3,icon:'🛡️',effect:'first',text:'Ao entrar como seu primeiro aliado aqui, recebe +1 DEF permanente.'},
  vale_scout:{deck:'vale',name:'Batedora da Muralha',type:'unit',cost:1,attack:1,defense:2,icon:'🦅',effect:'draw',text:'Ao entrar: compre 1 carta.'},
  vale_shield:{deck:'vale',name:'Porta-Escudo',type:'unit',cost:2,attack:1,defense:5,icon:'🔰',effect:'flagGuard',text:'Ao entrar no local da Bandeira, recebe +2 DEF nesta rodada.'},
  vale_spear:{deck:'vale',name:'Lanceiro do Fosso',type:'unit',cost:2,attack:3,defense:3,icon:'🔱',effect:'chip',text:'Ao entrar: a maior unidade inimiga aqui recebe −1 DEF nesta rodada.'},
  vale_guard:{deck:'vale',name:'Guarda do Portão',type:'unit',cost:3,attack:3,defense:5,icon:'⚔️',effect:'behind',text:'Ao entrar com menos aliados que inimigos, recebe +1 ATQ e +1 DEF nesta rodada.'},
  vale_sister:{deck:'vale',name:'Irmã da Capela',type:'unit',cost:3,attack:1,defense:4,icon:'🕯️',effect:'bless',text:'Ao entrar: seu outro aliado mais frágil aqui recebe +2 DEF nesta rodada.'},
  vale_knight:{deck:'vale',name:'Cavaleiro da Torre',type:'unit',cost:4,attack:5,defense:5,icon:'♜',effect:'none',text:'Um combatente equilibrado, sem efeito adicional.'},
  vale_marshal:{deck:'vale',name:'Marechal de Valebruma',type:'unit',cost:5,attack:4,defense:7,icon:'👑',effect:'marshal',text:'Ao entrar: seus outros aliados aqui recebem +1 DEF nesta rodada.'},
  vale_rally:{deck:'vale',name:'Reagrupar!',type:'tactic',cost:1,icon:'📯',effect:'rally',text:'Seu aliado com menor ATQ aqui recebe +2 ATQ nesta rodada.'},
  vale_march:{deck:'vale',name:'Marcha Forçada',type:'tactic',cost:2,icon:'🥾',effect:'march',text:'Mova seu aliado mais fraco de outro local para cá. Ele chega exausto e recebe +1 ATQ no próximo combate.'},
  vale_barricade:{deck:'vale',name:'Erguer Barricadas',type:'tactic',cost:2,icon:'🪵',effect:'barricade',text:'Seus aliados aqui recebem +2 DEF e não podem ser reduzidos ou movidos nesta rodada.'},
  vale_laststand:{deck:'vale',name:'Segurar a Linha',type:'tactic',cost:3,icon:'🏰',effect:'laststand',text:'Seu aliado com menor DEF aqui recebe +4 DEF se estiver em desvantagem numérica; senão, +2.'},

  raven_rat:{deck:'raven',name:'Rato de Estrada',type:'unit',cost:1,attack:2,defense:2,icon:'🗡️',effect:'emptyRaid',text:'Ao entrar sem inimigos aqui, recebe +1 ATQ permanente.'},
  raven_spy:{deck:'raven',name:'Espião do Corvo',type:'unit',cost:1,attack:1,defense:2,icon:'🐦‍⬛',effect:'draw',text:'Ao entrar: compre 1 carta.'},
  raven_blade:{deck:'raven',name:'Lâmina Mercenária',type:'unit',cost:2,attack:3,defense:3,icon:'⚔️',effect:'none',text:'Ataque e defesa diretos por um preço justo.'},
  raven_saboteur:{deck:'raven',name:'Sabotadora da Ponte',type:'unit',cost:2,attack:2,defense:3,icon:'💣',effect:'sabotage',text:'Ao entrar: a maior unidade inimiga aqui recebe −2 DEF nesta rodada.'},
  raven_rider:{deck:'raven',name:'Cavaleiro do Corvo',type:'unit',cost:3,attack:4,defense:3,icon:'🐎',effect:'ride',text:'Investida: se a Bandeira estiver adjacente, mova-se até ela e possa atacar nesta rodada.'},
  raven_duelist:{deck:'raven',name:'Duelista Rubra',type:'unit',cost:3,attack:4,defense:3,icon:'🤺',effect:'duel',text:'Ao entrar com exatamente 1 inimigo aqui, recebe +2 ATQ nesta rodada.'},
  raven_knight:{deck:'raven',name:'Cavaleiro Negro',type:'unit',cost:4,attack:6,defense:5,icon:'♞',effect:'none',text:'Uma ameaça ofensiva pesada, sem efeito adicional.'},
  raven_chief:{deck:'raven',name:'Chefe da Companhia',type:'unit',cost:5,attack:5,defense:6,icon:'🪶',effect:'chief',text:'Ao entrar: seu outro aliado com maior ATQ aqui recebe +2 ATQ nesta rodada.'},
  raven_feint:{deck:'raven',name:'Finta Cruel',type:'tactic',cost:1,icon:'🩸',effect:'feint',text:'A unidade inimiga com maior ATQ aqui recebe −2 DEF nesta rodada.'},
  raven_path:{deck:'raven',name:'Passagem Secreta',type:'tactic',cost:2,icon:'🗝️',effect:'path',text:'Mova seu aliado com maior ATQ de outro local para cá. Ele chega exausto e recebe +2 ATQ no próximo combate. Não move o portador.'},
  raven_smoke:{deck:'raven',name:'Bomba de Fumaça',type:'tactic',cost:2,icon:'🌫️',effect:'smoke',text:'Mova a unidade inimiga mais frágil daqui para um campo adjacente com menos inimigos. Não move o portador.'},
  raven_allin:{deck:'raven',name:'Tudo ou Nada',type:'tactic',cost:3,icon:'🔥',effect:'allin',text:'Seus aliados aqui recebem +1 ATQ no próximo combate; se a Bandeira estiver aqui, recebem +2 em vez disso.'}
};

const LOCATIONS = {
  bridge:{name:'Ponte dos Juramentos',icon:'🌉',effect:'A primeira unidade de cada lado jogada aqui por rodada recebe +1 ATQ nesta rodada.'},
  chapel:{name:'Capela da Última Luz',icon:'⛪',effect:'A primeira unidade de cada lado jogada aqui por rodada recebe +1 Escudo nesta rodada.'},
  market:{name:'Praça do Mercado',icon:'🏘️',effect:'A primeira unidade aliada jogada aqui recebe +1 ATQ e +1 Escudo nesta rodada.'},
  tower:{name:'Torre de Vigia',icon:'🗼',effect:'Uma unidade jogada aqui recebe +1 Escudo se seu lado não tiver mais unidades que o inimigo.'},
  forest:{name:'Estrada da Floresta',icon:'🌲',effect:'Uma unidade movida para cá recebe +1 ATQ nesta rodada.'},
  mire:{name:'Charco das Lanças',icon:'🌫️',effect:'Uma unidade com ATQ impresso 5+ jogada aqui recebe −1 ATQ nesta rodada.'}
};

let state = null;
let mode = 'local';
let myIndex = null;
let peer = null;
let conn = null;
let conns = [];
let lobbyStatus = '';
let selection = null;
let inspect = null;
let uidSeq = 1;

function esc(value){return String(value??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function cleanName(value,fallback){const out=String(value||'').replace(/[<>&"']/g,'').trim().slice(0,18);return out||fallback;}
function shuffle(list){const a=list.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function online(){return mode==='host'||mode==='guest';}
function other(pi){return 1-pi;}
function log(message){if(!state)return;state.log.unshift({round:state.turno,text:message});state.log=state.log.slice(0,120);}
function draw(player,count=1){for(let i=0;i<count;i++){if(player.deck.length)player.hand.push(player.deck.pop());}}
function makeDeck(deckId){return shuffle(DECKS[deckId].cards.flatMap(id=>[id,id]));}
function makePlayer(name,deckId){
  const player={name,deckId,role:'',mana:0,maxMana:0,deck:makeDeck(deckId),hand:[],discard:[],units:[],kills:0};
  draw(player,4);
  if(!player.hand.some(id=>CARDS[id].type==='unit'&&CARDS[id].cost===1)){
    const index=player.deck.findIndex(id=>CARDS[id].type==='unit'&&CARDS[id].cost===1);
    if(index>=0){const vanguard=player.deck.splice(index,1)[0];player.deck.unshift(player.hand.pop());player.hand.push(vanguard);}
  }
  return player;
}

function createState(deck0,deck1,name0,name1,hideHands,roleMode='random'){
  const ids=shuffle(Object.keys(LOCATIONS));
  const attacker=roleMode==='p1'?0:roleMode==='p2'?1:Math.floor(Math.random()*2);
  const players=[makePlayer(name0,deck0),makePlayer(name1,deck1)];
  players[attacker].role='Ladrão';players[other(attacker)].role='Guardião';
  return {
    turno:0,phase:'setup',priority:0,activePlayer:0,consecutivePasses:0,vezLocal:0,hideHands:!!hideHands,passPending:false,
    revision:0,nextUid:1,actionSeq:0,actionQueue:[],actionHistory:[],overtime:false,
    players,
    locations:[0,1,2].map(index=>({id:ids.shift(),open:true,revealed:true,activeFromRound:index+1})),
    mission:{id:'stolen-banner',revealed:false,active:false,attacker,defender:other(attacker),home:null,extraction:null,flag:{status:'sealed',loc:null,carrierUid:null}},
    log:[],gameOver:null
  };
}

function startLocalGame(){
  closeNetwork();mode='local';myIndex=null;selection=null;inspect=null;
  state=createState($('#p1Deck').value,$('#p2Deck').value,cleanName($('#p1Name').value,'Jogador 1'),cleanName($('#p2Name').value,'Jogador 2'),$('#hideHands').value==='yes',$('#roleMode').value);
  log('A campanha começou. Os jogadores agora alternam uma ação de cada vez.');startRound(1);render();
}

function startRound(round){
  state.turno=round;state.phase='actions';state.priority=(round-1)%2;state.activePlayer=state.priority;state.consecutivePasses=0;state.vezLocal=state.activePlayer;state.passPending=false;state.actionQueue=[];selection=null;
  for(const player of state.players){
    player.maxMana=Math.min(round,8);player.mana=player.maxMana;if(round>1)draw(player,round>=3?2:1);
    for(const unit of player.units){unit.attackTemp=0;unit.shield=0;unit.ward=false;unit.reinforced=false;unit.charge=false;}
  }
  if(round<=3){const loc=round-1,data=LOCATIONS[state.locations[loc].id];recordAction(null,'system','✦','Efeito do Campo '+round+' ativado',data.name+' · '+data.effect);log('✦ O efeito de '+data.name+' despertou: '+data.effect);}
  if(round===2&&!state.mission.revealed){
    state.mission.revealed=true;state.phase='flag-choice';state.activePlayer=state.mission.defender;state.vezLocal=state.activePlayer;
    log('📜 Missão revelada. O Guardião deve escolher publicamente onde proteger a Bandeira.');
  }
  if(round===3&&!state.mission.active){
    state.mission.active=true;state.mission.flag.status='ground';state.mission.flag.loc=state.mission.home??1;
    log('⚑ O terceiro efeito despertou e a Bandeira está ativa. A iniciativa normal da rodada foi mantida.');
  }
  if(round>MAX_ROUNDS){state.overtime=true;log('⏳ Prorrogação: a partida segue até Extração, Recuperação segura ou 10 Baixas.');}
  log('Rodada '+round+': mana recarregada para '+Math.min(round,8)+'. '+state.players[state.activePlayer].name+' começa.');
}

function locationOpen(loc){return !!state.locations[loc]&&state.locations[loc].open!==false;}
function locationEffectActive(loc){const location=state.locations[loc];return !!location&&state.turno>=(location.activeFromRound??loc+1);}
function slotLabel(loc,names=true){if(names&&state.locations[loc]?.revealed)return LOCATIONS[state.locations[loc].id].name;return loc===0?'Campo 1':loc===1?'Campo 2 · Centro':'Campo 3';}
function chooseFlag(pi,loc){
  if(!state||state.phase!=='flag-choice'||pi!==state.mission.defender||!canChooseFlag(pi)||![0,1,2].includes(loc))return;
  const mission=state.mission;mission.home=loc;mission.extraction=loc===0?2:loc===2?0:(mission.attacker===0?0:2);mission.flag.loc=loc;mission.flag.status='sealed';
  recordAction(pi,'flag','⚑','Bandeira posicionada',slotLabel(loc)+' · fuga por '+slotLabel(mission.extraction));
  log('⚑ '+state.players[pi].name+' escolheu '+slotLabel(loc)+' para proteger a Bandeira. A rota de fuga será '+slotLabel(mission.extraction)+'.');
  state.phase='actions';state.activePlayer=state.priority;state.vezLocal=state.activePlayer;state.passPending=state.hideHands&&state.activePlayer!==pi;commitAndSync();
}
function canChooseFlag(pi){if(!state||state.gameOver||state.phase!=='flag-choice'||pi!==state.mission.defender)return false;if(online())return pi===myIndex;return !state.passPending;}

function unitsAt(pi,loc){return state.players[pi].units.filter(unit=>unit.loc===loc);}
function maxDefense(unit){return CARDS[unit.id].defense+(unit.defPerm||0);}
function attackValue(pi,unit){let value=CARDS[unit.id].attack+(unit.attackPerm||0)+(unit.attackTemp||0)+(unit.nextCombatBonus||0);if(state.mission.flag.carrierUid===unit.uid)value-=1;return Math.max(0,value);}
function attackBreakdown(pi,unit){const parts=[CARDS[unit.id].attack+' base'];if(unit.attackPerm)parts.push((unit.attackPerm>0?'+':'')+unit.attackPerm+' permanente');if(unit.attackTemp)parts.push((unit.attackTemp>0?'+':'')+unit.attackTemp+' nesta rodada');if(unit.nextCombatBonus)parts.push('+'+unit.nextCombatBonus+' próximo combate');if(state.mission.flag.carrierUid===unit.uid)parts.push('−1 portador');return parts.join(' · ');}
function defenseValue(unit){return Math.max(0,(unit.hp||0)+(unit.shield||0));}
function weakest(list){return list.slice().sort((a,b)=>(CARDS[a.id].attack+(a.attackPerm||0))-(CARDS[b.id].attack+(b.attackPerm||0))||a.uid-b.uid)[0]||null;}
function strongest(list){return list.slice().sort((a,b)=>(CARDS[b.id].attack+(b.attackPerm||0))-(CARDS[a.id].attack+(a.attackPerm||0))||a.uid-b.uid)[0]||null;}
function mostFragile(list){return list.slice().sort((a,b)=>defenseValue(a)-defenseValue(b)||a.uid-b.uid)[0]||null;}
function flagAt(loc){return state.mission.revealed&&Number.isInteger(state.mission.flag.loc)&&state.mission.flag.loc===loc;}
function locationPower(pi,loc){return unitsAt(pi,loc).reduce((sum,unit)=>sum+attackValue(pi,unit),0);}
function totalPower(pi){return state.players[pi].units.reduce((sum,unit)=>sum+attackValue(pi,unit)+defenseValue(unit),0);}
function unitReady(unit){return (unit.enteredTurn<state.turno||unit.charge)&&unit.actedTurn!==state.turno;}

function canAct(pi){
  if(!state||state.gameOver||state.phase!=='actions'||state.activePlayer!==pi)return false;
  if(online())return pi===myIndex;
  if(state.hideHands)return pi===state.vezLocal&&!state.passPending;
  return true;
}
function canSeeHand(pi){
  if(!state)return false;if(state.gameOver)return true;if(online())return pi===myIndex;if(!state.hideHands)return true;
  return state.phase==='actions'&&pi===state.vezLocal&&!state.passPending;
}
function selectCard(pi,index){
  if(!canAct(pi))return;const id=state.players[pi].hand[index];if(!id||state.players[pi].mana<CARDS[id].cost)return;
  selection=selection&&selection.type==='card'&&selection.pi===pi&&selection.index===index?null:{type:'card',pi,index};inspect={type:'card',id};render();
}
function legalPlayLocation(pi,id,loc){const card=CARDS[id];return !!(card&&locationOpen(loc)&&(card.type!=='unit'||unitsAt(pi,loc).length<LOCATION_CAP));}
function handleLocationClick(loc){
  if(!selection)return;
  if(selection.type==='card')playSelected(loc);
  else if(selection.type==='move')executeMove(selection.pi,selection.uid,loc);
}
function playSelected(loc){
  if(!selection||selection.type!=='card'||!canAct(selection.pi))return;
  const pi=selection.pi,player=state.players[pi],id=player.hand[selection.index],card=CARDS[id];if(!card||player.mana<card.cost||!legalPlayLocation(pi,id,loc))return;
  player.hand.splice(selection.index,1);player.mana-=card.cost;
  recordAction(pi,'card',card.icon,card.name,slotLabel(loc));resolveCard(pi,{id,slot:loc});selection=null;finishAction(pi);
}
function confirmPass(){state.passPending=false;selection=null;render();}

function recordAction(pi,kind,icon,title,detail,cardId=null){
  const event={seq:++state.actionSeq,round:state.turno,pi,kind,icon,title,detail,cardId};state.actionQueue.push(event);state.actionHistory.push(event);state.actionHistory=state.actionHistory.slice(-80);
}
function commitAndSync(){state.revision=(state.revision||0)+1;sync();}
function handoffTo(pi){state.activePlayer=pi;state.vezLocal=pi;if(!online()&&state.hideHands)state.passPending=true;commitAndSync();}
function finishAction(pi){state.consecutivePasses=0;selection=null;handoffTo(other(pi));}
function passAction(pi){
  if(!canAct(pi))return;selection=null;recordAction(pi,'pass','✋','Passou','Sem realizar ação');log('✋ '+state.players[pi].name+' passou.');state.consecutivePasses++;
  if(state.consecutivePasses>=2){finishRound();return;}handoffTo(other(pi));
}

function addAttack(unit,value){if(unit)unit.attackTemp=(unit.attackTemp||0)+value;}
function addShield(unit,value){if(unit)unit.shield=(unit.shield||0)+value;}
function weakenDefense(unit,value){
  if(!unit)return false;if(unit.ward){log(CARDS[unit.id].name+' resistiu ao enfraquecimento.');return false;}
  let remaining=value;const absorbed=Math.min(unit.shield||0,remaining);unit.shield-=absorbed;remaining-=absorbed;if(remaining>0)unit.hp=Math.max(1,unit.hp-remaining);return true;
}
function applyLocationEntry(pi,unit,loc){
  if(!locationEffectActive(loc))return;
  const id=state.locations[loc].id,allies=unitsAt(pi,loc),enemies=unitsAt(other(pi),loc),arrivals=allies.filter(u=>u.enteredTurn===state.turno);
  if(id==='bridge'&&arrivals.length===1)addAttack(unit,1);
  if(id==='chapel'&&arrivals.length===1)addShield(unit,1);
  if(id==='market'&&allies.length===1){addAttack(unit,1);addShield(unit,1);}
  if(id==='tower'&&allies.length<=enemies.length)addShield(unit,1);
  if(id==='mire'&&CARDS[unit.id].attack>=5)addAttack(unit,-1);
}
function moveUnit(pi,unit,destination,enemyEffect=false,adjacentOnly=false,cardMovement=false){
  if(!unit||unit.loc===destination||!locationOpen(destination))return false;if(adjacentOnly&&Math.abs(unit.loc-destination)!==1)return false;if(cardMovement&&state.mission.flag.carrierUid===unit.uid)return false;
  if(enemyEffect&&unit.ward){log(CARDS[unit.id].name+' não pôde ser movido.');return false;}if(unitsAt(pi,destination).length>=LOCATION_CAP)return false;
  unit.loc=destination;unit.movedTurn=state.turno;if(locationEffectActive(destination)&&state.locations[destination].id==='forest')addAttack(unit,1);if(state.mission.flag.carrierUid===unit.uid)state.mission.flag.loc=destination;return true;
}
function otherOpenLocationWithFewest(pi,from,adjacentOnly=false){return state.locations.map((loc,index)=>({loc,index,count:unitsAt(pi,index).length})).filter(x=>locationOpen(x.index)&&x.index!==from&&(!adjacentOnly||Math.abs(x.index-from)===1)&&x.count<LOCATION_CAP).sort((a,b)=>a.count-b.count||Math.abs(a.index-from)-Math.abs(b.index-from))[0]?.index;}

function resolveCard(pi,item){
  const player=state.players[pi],card=CARDS[item.id],loc=item.slot;
  if(card.type==='unit'){
    const beforeAllies=unitsAt(pi,loc).length,beforeEnemies=unitsAt(other(pi),loc).length;
    const unit={uid:state.nextUid++,id:item.id,loc,attackPerm:0,attackTemp:0,nextCombatBonus:0,defPerm:0,hp:card.defense,shield:0,ward:false,reinforced:false,enteredTurn:state.turno,actedTurn:state.turno,movedTurn:null,charge:false};
    player.units.push(unit);if(beforeEnemies>beforeAllies){unit.shield+=1;unit.reinforced=true;log('✦ Reforço: '+card.name+' ganhou 1 Escudo ao entrar em desvantagem numérica.');}applyLocationEntry(pi,unit,loc);
    if(card.effect==='first'&&beforeAllies===0){unit.defPerm+=1;unit.hp+=1;}
    if(card.effect==='draw')draw(player,1);
    if(card.effect==='flagGuard'&&flagAt(loc))addShield(unit,2);
    if(card.effect==='chip'){const target=strongest(unitsAt(other(pi),loc));if(weakenDefense(target,1))log(card.name+' reduziu a DEF de '+CARDS[target.id].name+'.');}
    if(card.effect==='behind'&&beforeAllies<beforeEnemies){addAttack(unit,1);addShield(unit,1);}
    if(card.effect==='bless')addShield(mostFragile(unitsAt(pi,loc).filter(u=>u.uid!==unit.uid)),2);
    if(card.effect==='marshal')for(const ally of unitsAt(pi,loc))if(ally.uid!==unit.uid)addShield(ally,1);
    if(card.effect==='emptyRaid'&&beforeEnemies===0)unit.attackPerm+=1;
    if(card.effect==='sabotage'){const target=strongest(unitsAt(other(pi),loc));if(weakenDefense(target,2))log(card.name+' sabotou a DEF de '+CARDS[target.id].name+'.');}
    if(card.effect==='ride'&&state.mission.active&&Number.isInteger(state.mission.flag.loc)&&Math.abs(state.mission.flag.loc-loc)===1&&moveUnit(pi,unit,state.mission.flag.loc)){unit.charge=true;unit.actedTurn=null;addAttack(unit,1);}
    if(card.effect==='duel'&&unitsAt(other(pi),unit.loc).length===1)addAttack(unit,2);
    if(card.effect==='chief')addAttack(strongest(unitsAt(pi,unit.loc).filter(u=>u.uid!==unit.uid)),2);
    log(player.name+' jogou '+card.name+' em '+slotLabel(unit.loc)+'.');return;
  }
  const allies=()=>unitsAt(pi,loc),enemies=()=>unitsAt(other(pi),loc);
  if(card.effect==='rally')addAttack(weakest(allies()),2);
  if(card.effect==='march'){const source=weakest(player.units.filter(u=>u.loc!==loc&&locationOpen(u.loc)&&u.uid!==state.mission.flag.carrierUid));if(moveUnit(pi,source,loc,false,false,true)){source.actedTurn=state.turno;source.nextCombatBonus=(source.nextCombatBonus||0)+1;log(card.name+' trouxe '+CARDS[source.id].name+', que chegou exausto e preparou +1 ATQ para o próximo combate.');}}
  if(card.effect==='barricade')for(const unit of allies()){addShield(unit,2);unit.ward=true;}
  if(card.effect==='laststand'){const target=mostFragile(allies());addShield(target,allies().length<enemies().length?4:2);}
  if(card.effect==='feint'){const target=strongest(enemies());if(weakenDefense(target,2))log(card.name+' abriu a guarda de '+CARDS[target.id].name+'.');}
  if(card.effect==='path'){const source=strongest(player.units.filter(u=>u.loc!==loc&&locationOpen(u.loc)&&u.uid!==state.mission.flag.carrierUid));if(moveUnit(pi,source,loc,false,false,true)){source.actedTurn=state.turno;source.nextCombatBonus=(source.nextCombatBonus||0)+2;log(card.name+' trouxe '+CARDS[source.id].name+', que chegou exausto e preparou +2 ATQ para o próximo combate.');}}
  if(card.effect==='smoke'){const target=mostFragile(enemies().filter(u=>u.uid!==state.mission.flag.carrierUid)),destination=otherOpenLocationWithFewest(other(pi),loc,true);if(target&&destination!=null&&moveUnit(other(pi),target,destination,true,true,true))log(card.name+' expulsou '+CARDS[target.id].name+' para '+slotLabel(destination)+'.');}
  if(card.effect==='allin'){const bonus=flagAt(loc)?2:1,targets=allies();for(const unit of targets)unit.nextCombatBonus=(unit.nextCombatBonus||0)+bonus;if(targets.length){recordAction(pi,'effect','🔥','Tudo ou Nada preparou '+targets.length+' unidade(s)','+'+bonus+' ATQ no próximo combate · '+slotLabel(loc));log(card.name+' preparou '+targets.map(unit=>CARDS[unit.id].name+' '+attackValue(pi,unit)+' ATQ').join(', ')+'.');}else log(card.name+' não encontrou aliados em '+slotLabel(loc)+'.');}
  player.discard.push(item.id);log(player.name+' jogou a tática '+card.name+' em '+slotLabel(loc)+'.');
}

function findUnit(pi,uid){return state.players[pi].units.find(unit=>unit.uid===uid)||null;}
function legalAttackTargets(pi,uid){const attacker=findUnit(pi,uid);if(!attacker||!unitReady(attacker))return [];return unitsAt(other(pi),attacker.loc);}
function startAttack(pi,uid){if(!canAct(pi))return;const unit=findUnit(pi,uid);if(!unit||!unitReady(unit)||!legalAttackTargets(pi,uid).length)return;selection={type:'attack',pi,uid};inspect={type:'unit',id:unit.id,pi,uid};render();}
function applyDamage(unit,damage){let remaining=damage,shieldHit=Math.min(unit.shield||0,remaining);unit.shield-=shieldHit;remaining-=shieldHit;unit.hp-=remaining;return unit.hp<=0;}
function defeatUnit(ownerPi,unit,killerPi){
  if(!unit)return;const loc=unit.loc,card=CARDS[unit.id],owner=state.players[ownerPi],killer=state.players[killerPi];owner.units=owner.units.filter(candidate=>candidate.uid!==unit.uid);owner.discard.push(unit.id);killer.kills++;
  recordAction(killerPi,'death','💀',card.name+' eliminado',killer.name+' marcou a Baixa em '+slotLabel(loc),unit.id);log('💀 '+killer.name+' derrotou '+card.name+' de '+owner.name+'. Total: '+killer.kills+' Baixas.');
  if(state.mission.flag.carrierUid===unit.uid){state.mission.flag.status='ground';state.mission.flag.loc=loc;state.mission.flag.carrierUid=null;recordAction(ownerPi,'flag','⚑','Bandeira derrubada',slotLabel(loc));log('⚑ O portador caiu e a Bandeira ficou em '+slotLabel(loc)+'.');}
}
function checkKillVictory(){
  const reached=[0,1].filter(pi=>state.players[pi].kills>=KILL_GOAL);if(!reached.length)return false;
  if(reached.length===2){state.gameOver={winner:null,title:'Empate sangrento',reason:'Os dois exércitos alcançaram 10 Baixas no mesmo duelo.'};}
  else{const winner=reached[0];state.gameOver={winner,title:'Vitória por Deathmatch',reason:state.players[winner].name+' causou 10 Baixas inimigas.'};}
  state.phase='ended';return true;
}
function executeAttack(pi,attackerUid,targetUid){
  if(!canAct(pi)||!selection||selection.type!=='attack'||selection.uid!==attackerUid)return;const attacker=findUnit(pi,attackerUid),target=findUnit(other(pi),targetUid);if(!attacker||!target||target.loc!==attacker.loc||!unitReady(attacker))return;
  const attackDamage=attackValue(pi,attacker),counterDamage=attackValue(other(pi),target),targetBefore=defenseValue(target),attackerBefore=defenseValue(attacker);attacker.actedTurn=state.turno;
  attacker.nextCombatBonus=0;target.nextCombatBonus=0;
  const targetDies=applyDamage(target,attackDamage),attackerDies=applyDamage(attacker,counterDamage);
  recordAction(pi,'attack','⚔️',CARDS[attacker.id].name+' atacou '+CARDS[target.id].name,attackDamage+' dano ↔ '+counterDamage+' contra-ataque · '+slotLabel(attacker.loc),attacker.id);
  log('⚔️ '+CARDS[attacker.id].name+' causou '+attackDamage+'; '+CARDS[target.id].name+' revidou '+counterDamage+'.');
  if(targetDies)defeatUnit(other(pi),target,pi);if(attackerDies)defeatUnit(pi,attacker,other(pi));selection=null;
  if(checkKillVictory()){commitAndSync();return;}finishAction(pi);
}

function isCarrier(unit){return !!unit&&state.mission.flag.carrierUid===unit.uid;}
function carrierBlockers(pi,unit){return isCarrier(unit)?unitsAt(other(pi),unit.loc).length:0;}
function startMove(pi,uid){if(!canAct(pi))return;const unit=findUnit(pi,uid);if(!unit||!unitReady(unit)||carrierBlockers(pi,unit)>0)return;selection={type:'move',pi,uid};inspect={type:'unit',id:unit.id,pi,uid};render();}
function legalMoveDestination(pi,unit,loc){return !!(unit&&locationOpen(loc)&&Math.abs(unit.loc-loc)===1&&unitsAt(pi,loc).length<LOCATION_CAP&&carrierBlockers(pi,unit)===0);}
function executeMove(pi,uid,loc){
  if(!canAct(pi)||!selection||selection.type!=='move'||selection.uid!==uid)return;const unit=findUnit(pi,uid);if(!legalMoveDestination(pi,unit,loc))return;const from=unit.loc;unit.actedTurn=state.turno;if(!moveUnit(pi,unit,loc,false,true))return;
  recordAction(pi,'move','🥾',CARDS[unit.id].name+' marchou',slotLabel(from)+' → '+slotLabel(loc),unit.id);log('🥾 '+CARDS[unit.id].name+' moveu para '+slotLabel(loc)+'.');selection=null;finishAction(pi);
}

function objectiveEnemies(pi,loc){return unitsAt(other(pi),loc).length;}
function flagInteractionState(pi,unit){
  if(!state.mission.active||!unit)return null;const mission=state.mission,flag=mission.flag;let action=null;
  if(pi===mission.attacker&&flag.status==='ground'&&unit.loc===flag.loc)action='steal';
  else if(pi===mission.attacker&&flag.status==='carried'&&flag.carrierUid===unit.uid&&unit.loc===mission.extraction)action='extract';
  else if(pi===mission.defender&&flag.status==='ground'&&flag.loc!==mission.home&&unit.loc===flag.loc)action='recover';
  if(!action)return null;const enemies=objectiveEnemies(pi,unit.loc),ready=unitReady(unit),allowed=ready&&enemies===0;
  return {action,enemies,ready,allowed,reason:!ready?'Unidade exausta':enemies?enemies+' inimigo(s) contestando o local':''};
}
function flagActionFor(pi,unit){const interaction=flagInteractionState(pi,unit);return interaction?.allowed?interaction.action:null;}
function executeFlagAction(pi,uid){
  if(!canAct(pi))return;const unit=findUnit(pi,uid),interaction=unit?flagInteractionState(pi,unit):null;if(!interaction?.allowed)return;const action=interaction.action;unit.actedTurn=state.turno;const flag=state.mission.flag;
  if(action==='steal'){flag.status='carried';flag.carrierUid=unit.uid;recordAction(pi,'flag','⚑',CARDS[unit.id].name+' roubou a Bandeira',slotLabel(unit.loc));log('⚑ '+CARDS[unit.id].name+' agora carrega a Bandeira.');}
  if(action==='recover'){
    flag.status='ground';flag.loc=state.mission.home;flag.carrierUid=null;recordAction(pi,'flag','🛡️','Bandeira recuperada','Voltou para '+slotLabel(flag.loc));log('🛡️ O Guardião devolveu a Bandeira ao ponto inicial.');
    if(state.overtime){state.gameOver={winner:pi,title:'Bandeira recuperada',reason:state.players[pi].name+' recuperou o Estandarte durante a Prorrogação.'};state.phase='ended';selection=null;commitAndSync();return;}
  }
  if(action==='extract'){recordAction(pi,'flag','🏁','Bandeira extraída',slotLabel(unit.loc));state.gameOver={winner:pi,title:'Bandeira capturada',reason:state.players[pi].name+' sobreviveu à rota e gastou uma ação para Extrair.'};state.phase='ended';selection=null;commitAndSync();return;}
  finishAction(pi);
}

function finishRound(){
  selection=null;state.passPending=false;state.activePlayer=null;
  if(state.turno>=MAX_ROUNDS){const flag=state.mission.flag,safe=flag.status==='ground'&&flag.loc===state.mission.home;
    if(safe){const winner=state.mission.defender;state.gameOver={winner,title:'O Estandarte resistiu',reason:state.players[winner].name+' manteve a Bandeira segura até o fim da rodada 8.'};state.phase='ended';commitAndSync();return;}
    if(!state.overtime){state.overtime=true;recordAction(state.mission.attacker,'system','⏳','Prorrogação','A Bandeira ainda está em disputa');log('⏳ A Bandeira não está segura: a partida entra em Prorrogação.');}
  }
  state.phase='review';commitAndSync();
}
function nextRound(){if(!state||state.gameOver||state.phase!=='review')return;if(online()&&mode!=='host')return;startRound(state.turno+1);commitAndSync();}

function inspectCard(id){inspect={type:'card',id};render();}
function inspectUnit(pi,uid){const unit=state.players[pi].units.find(u=>u.uid===uid);if(unit){inspect={type:'unit',id:unit.id,pi,uid};render();}}

/* ---------- PeerJS ---------- */
function roomCode(){const alphabet='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let out='';for(let i=0;i<5;i++)out+=alphabet[Math.floor(Math.random()*alphabet.length)];return out;}
function setLobbyStatus(html){lobbyStatus=html;const el=$('#statusLobby');if(el)el.innerHTML=html;}
function hasPeer(){if(typeof Peer==='undefined'){setLobbyStatus('O modo online precisa de internet para carregar o PeerJS.');return false;}return true;}
function closeNetwork(){try{if(conn)conn.close();}catch{}try{for(const c of conns)c.close();}catch{}try{if(peer)peer.destroy();}catch{}peer=null;conn=null;conns=[];}
function sendNetwork(message,except=null){if(mode==='host'){for(const c of conns)if(c!==except&&c.open)c.send(message);}else if(mode==='guest'&&conn?.open)conn.send(message);}
function sync(except=null){if(online())sendNetwork({t:'state',protocol:PROTOCOL_VERSION,state},except);render();}
function applyRemoteState(remote){
  if(!remote||typeof remote!=='object')return;if(state&&(remote.revision||0)<(state.revision||0))return;
  state=remote;selection=null;inspect=null;render();
}
function createRoom(){
  if(!hasPeer())return;closeNetwork();const code=roomCode();setLobbyStatus('Erguendo a sala...');
  peer=new Peer(ROOM_PREFIX+code,{debug:0});
  peer.on('open',()=>{mode='host';myIndex=0;setLobbyStatus('Sala criada. Envie este código:<span class="room-code">'+code+'</span>Aguardando o segundo jogador...');});
  peer.on('connection',c=>{
    if(state||conns.length>=1){c.on('open',()=>c.close());return;}conns=[c];
    c.on('data',message=>receiveGuest(c,message));c.on('close',()=>disconnected('O segundo jogador se desconectou.'));
  });
  peer.on('error',error=>setLobbyStatus('Erro ao criar sala: '+esc(error.type)+'.'));
}
function receiveGuest(c,message){
  if(!message||typeof message!=='object')return;
  if(message.t==='hello'&&!state){
    if(message.protocol!==PROTOCOL_VERSION){c.send({t:'version-error'});c.close();return;}
    const guestDeck=DECKS[message.deckId]?message.deckId:'raven';
    state=createState($('#p1Deck').value,guestDeck,cleanName($('#p1Name').value,'Jogador 1'),cleanName(message.name,'Jogador 2'),true,$('#roleMode').value);
    log('A partida online começou. Cada ação será pública e alternada.');startRound(1);
    c.send({t:'init',protocol:PROTOCOL_VERSION,state,index:1});setLobbyStatus('');render();
  }else if(message.t==='state'&&state&&message.protocol===PROTOCOL_VERSION){applyRemoteState(message.state);sendNetwork({t:'state',protocol:PROTOCOL_VERSION,state},c);}
}
function joinRoom(){
  if(!hasPeer())return;closeNetwork();const code=($('#roomInput').value||'').trim().toUpperCase();if(code.length!==5){setLobbyStatus('Digite o código de 5 caracteres.');return;}
  const name=cleanName($('#p2Name').value,'Jogador 2'),deckId=$('#p2Deck').value;setLobbyStatus('Procurando a sala...');peer=new Peer({debug:0});
  peer.on('open',()=>{
    conn=peer.connect(ROOM_PREFIX+code,{reliable:true});
    conn.on('open',()=>{mode='guest';myIndex=1;conn.send({t:'hello',protocol:PROTOCOL_VERSION,name,deckId});setLobbyStatus('Conectado. Aguardando o anfitrião...');});
    conn.on('data',message=>{
      if(!message||typeof message!=='object')return;
      if(message.t==='init'&&message.protocol===PROTOCOL_VERSION){state=message.state;myIndex=message.index;mode='guest';render();}
      else if(message.t==='state'&&message.protocol===PROTOCOL_VERSION)applyRemoteState(message.state);
      else if(message.t==='version-error')setLobbyStatus('A outra pessoa está usando uma versão diferente do protótipo.');
    });
    conn.on('close',()=>disconnected('A conexão com o anfitrião foi encerrada.'));
  });
  peer.on('error',error=>setLobbyStatus(error.type==='peer-unavailable'?'Sala não encontrada.':'Erro de conexão: '+esc(error.type)+'.'));
}
function disconnected(message){if(!state){setLobbyStatus(message);return;}log(message);state.connectionLost=message;state.phase='disconnected';render();}
function resetGame(){closeNetwork();state=null;mode='local';myIndex=null;lobbyStatus='';selection=null;inspect=null;render();}

/* ---------- Rendering ---------- */
function render(){if(!state){renderSetup();return;}renderGame();}
function renderSetup(){
  $('#app').innerHTML=`<div class="setup-shell"><header class="setup-hero"><div class="eyebrow">Protótipo de combate e missão assimétrica</div><h1>Age of Guthology<span>O Estandarte Roubado</span></h1><p>Uma ação por vez: jogue uma carta, ataque, mova ou passe. ATQ causa dano à DEF e o alvo contra-ataca; a primeira condição concluída — Extração ou 10 Baixas — encerra a batalha.</p></header>
  <div class="setup-grid"><section class="setup-card"><h2>Preparar os exércitos</h2><p>Dois baralhos básicos, papéis independentes e mana recarregada a cada rodada.</p>
  <div class="player-config"><div class="crest">I</div><label>Jogador 1<input id="p1Name" maxlength="18" value="Jogador 1"></label><label>Baralho<select id="p1Deck">${deckOptions('vale')}</select></label></div>
  <div class="player-config"><div class="crest blue">II</div><label>Jogador 2<input id="p2Name" maxlength="18" value="Jogador 2"></label><label>Baralho<select id="p2Deck">${deckOptions('raven')}</select></label></div>
  <div class="deck-showcase">${deckTile('vale')}${deckTile('raven')}</div>

function renderWarPanel(){const p0=state.players[0],p1=state.players[1];return `<section class="panel"><div class="panel-title">Deathmatch · Baixas</div><div class="panel-body"><div class="war-score"><div class="score-side"><div class="score-name">${esc(p0.name)}</div><div class="score-num">${p0.kills}</div><div class="score-goal">de ${KILL_GOAL} 💀</div></div><div class="score-vs">×</div><div class="score-side"><div class="score-name">${esc(p1.name)}</div><div class="score-num">${p1.kills}</div><div class="score-goal">de ${KILL_GOAL} 💀</div></div></div><div class="score-track">${Array.from({length:KILL_GOAL},(_,i)=>`<span class="score-pip ${i<p0.kills?'p0':''} ${i<p1.kills?'p1':''}"></span>`).join('')}</div></div></section>`;}

function renderPlayerRibbon(pi,isEnemy){const p=state.players[pi],deck=DECKS[p.deckId],can=canAct(pi),active=state.activePlayer===pi&&state.phase==='actions';return `<div class="player-ribbon ${isEnemy?'enemy':''} ${active?'active-ribbon':''}"><div class="ribbon-crest p${pi}">${deck.icon}</div><div class="player-meta"><b>${esc(p.name)}</b><span>${deck.name} · ${state.mission.revealed?p.role:'papel oculto'} · ${active?'SUA AÇÃO':'aguardando'}</span></div><div class="ribbon-stat">Mana <strong>${p.mana}/${p.maxMana}</strong></div><div class="ribbon-stat">Deck <strong>${p.deck.length}</strong></div><div class="ribbon-stat">Mão <strong>${p.hand.length}</strong></div>${isEnemy?`<div class="hand-mini">${Array.from({length:Math.min(p.hand.length,7)},()=>'<span class="mini-back"></span>').join('')}</div>`:''}<div class="ribbon-actions"><button class="btn primary" onclick="passAction(${pi})" ${!can?'disabled':''}>Passar ação</button></div></div>`;}

function renderHandCards(pi){const p=state.players[pi],can=canAct(pi);return `<div class="hand-scroll">${p.hand.map((id,index)=>{const c=CARDS[id],selected=selection&&selection.type==='card'&&selection.pi===pi&&selection.index===index,disabled=!can||p.mana<c.cost;return `<button class="hand-card ${c.deck==='raven'?'raven':''} ${c.type==='tactic'?'tactic':''} ${selected?'selected':''}" onclick="selectCard(${pi},${index})" ${disabled?'disabled':''} aria-label="${esc(c.name)}, custo ${c.cost}${c.type==='unit'?', '+c.attack+' ataque, '+c.defense+' defesa':''}"><span class="card-cost">${c.cost}</span><span class="card-art">${c.icon}</span><span class="card-stats">${c.type==='unit'?`<b class="atk">⚔ ${c.attack}</b><b class="def">🛡 ${c.defense}</b>`:'<b class="magic">✦</b>'}</span><span class="card-type">${c.type==='unit'?'Unidade':'Tática'}</span><span class="card-name">${esc(c.name)}</span><span class="card-text">${esc(c.text)}</span></button>`;}).join('')||'<div class="hand-hidden-note">Sem cartas na mão.</div>'}</div>`;}

function renderActionQueue(){const active=Number.isInteger(state.activePlayer)?state.players[state.activePlayer].name:'—';return `<section class="action-queue" aria-live="polite"><div class="queue-head"><b>Linha de Ações · Rodada ${state.turno}</b><span>ordem pública de cartas, ataques, efeitos e missão</span><span class="turn-now">${state.phase==='actions'?'Vez de '+esc(active):state.phase==='flag-choice'?'Guardião escolhendo':'Revisão'}</span></div><div class="queue-scroll">${state.actionQueue.length?state.actionQueue.map(event=>`<div class="queue-item ${Number.isInteger(event.pi)?'p'+event.pi:'system'}"><span class="queue-icon">${event.icon}</span><span class="queue-copy"><b>${esc(event.title)}</b><span>${esc(state.players[event.pi]?.name||'Sistema')} · ${esc(event.detail)}</span></span><span class="queue-number">#${event.seq}</span></div>`).join(''):'<div class="queue-empty">Aguardando a primeira ação desta rodada.</div>'}</div></section>`;}
function combatPreview(pi,attacker,target){const dealt=attackValue(pi,attacker),returned=attackValue(other(pi),target),targetAfter=defenseValue(target)-dealt,attackerAfter=defenseValue(attacker)-returned;return {dealt,returned,targetAfter,attackerAfter,text:`${dealt} dano → ${targetAfter<=0?'alvo morre':'alvo fica com '+targetAfter+' DEF'}; contra-ataque ${returned} → ${attackerAfter<=0?'atacante morre':'atacante fica com '+attackerAfter+' DEF'}`};}
function renderLocation(loc,top,bottom){if(!locationOpen(loc))return `<article class="location-column fog"><div class="lane"><div class="lane-empty">Fechado</div></div><div class="fog-card">${slotLabel(loc,false)}<br><small>campo indisponível</small></div><div class="lane"><div class="lane-empty">Fechado</div></div></article>`;return `<article class="location-column">${renderLane(top,loc)}${renderLocationCard(loc)}${renderLane(bottom,loc)}</article>`;}
function renderLane(pi,loc){const p=state.players[pi],units=unitsAt(pi,loc);const unitHtml=units.map(unit=>{const card=CARDS[unit.id],carrier=isCarrier(unit),blockers=carrierBlockers(pi,unit),ready=unitReady(unit),attackTarget=selection&&selection.type==='attack'&&selection.pi===other(pi)&&findUnit(selection.pi,selection.uid)?.loc===loc;const click=attackTarget?`executeAttack(${selection.pi},${selection.uid},${unit.uid})`:`inspectUnit(${pi},${unit.uid})`;const canControl=canAct(pi),interaction=flagInteractionState(pi,unit),canMove=canControl&&ready&&blockers===0&&state.locations.some((l,i)=>legalMoveDestination(pi,unit,i)),canAttack=canControl&&ready&&unitsAt(other(pi),loc).length>0;let status=carrier?'Portador −1 ATQ · ':'';status+=unit.enteredTurn===state.turno&&!unit.charge?'Recém-chegada':ready?'Pronta':'Exausta';if(unit.nextCombatBonus)status+=' · Ímpeto +'+unit.nextCombatBonus;if(unit.shield)status+=' · Escudo '+unit.shield;if(unit.reinforced)status+=' · Reforço';if(blockers)status+=' · Interceptada por '+blockers;const preview=attackTarget?combatPreview(selection.pi,findUnit(selection.pi,selection.uid),unit):null;const actionLabel=interaction?(interaction.action==='steal'?'Roubar':interaction.action==='recover'?'Recuperar':'Extrair'):'';const objectiveButton=interaction?`<button class="unit-action ${interaction.allowed?'':'objective-blocked'}" onclick="executeFlagAction(${pi},${unit.uid})" ${!canControl||!interaction.allowed?'disabled':''} title="${esc(interaction.allowed?actionLabel:interaction.reason)}" aria-label="${esc(interaction.allowed?actionLabel:actionLabel+' bloqueado: '+interaction.reason)}">${interaction.allowed?actionLabel:'🔒 '+actionLabel}</button>`:'';return `<div class="unit-row"><button class="unit-chip p${pi} ${carrier?'carrier':''} ${unit.ward?'ward':''} ${attackTarget?'targetable':''} ${!ready?'exhausted':''} ${unit.enteredTurn===state.turno?'new-unit':''}" onclick="${click}"><span class="unit-icon">${card.icon}</span><span class="unit-copy"><b>${esc(card.name)} ${carrier?'⚑':''}</b><span>${status}${preview?`<span class="attack-preview">${preview.text}</span>`:''}</span></span><span class="combat-stats"><b class="atk">⚔ ${attackValue(pi,unit)}</b><b class="def">🛡 ${defenseValue(unit)}/${maxDefense(unit)}</b></span></button><span class="unit-actions"><button class="unit-action" onclick="startAttack(${pi},${unit.uid})" ${!canAttack?'disabled':''}>Atacar</button><button class="unit-action" onclick="startMove(${pi},${unit.uid})" ${!canMove?'disabled':''} title="${carrier&&blockers?'Portador interceptado: elimine ou remova os inimigos daqui.':'Mover para um campo adjacente'}">${carrier&&blockers?'🔒 Mover':'Mover'}</button>${objectiveButton}</span></div>`;}).join('');return `<div class="lane"><div class="lane-head"><span>${esc(p.name)}</span><strong>⚔ ${locationPower(pi,loc)}</strong></div>${unitHtml||'<div class="lane-empty">— vazio —</div>'}</div>`;}
function locationSelectable(loc){if(!selection)return false;if(selection.type==='card'){const id=state.players[selection.pi].hand[selection.index];return canAct(selection.pi)&&legalPlayLocation(selection.pi,id,loc);}if(selection.type==='move')return canAct(selection.pi)&&legalMoveDestination(selection.pi,findUnit(selection.pi,selection.uid),loc);return false;}
function renderLocationCard(loc){const location=state.locations[loc],data=LOCATIONS[location.id],active=locationEffectActive(loc),targetable=locationSelectable(loc),flagHere=state.mission.revealed&&state.mission.flag.loc===loc,home=state.mission.home===loc,escape=state.mission.extraction===loc,defenders=escape?unitsAt(state.mission.defender,loc).length:0;const flag=flagHere?`<div class="flag-marker">${state.mission.flag.status==='carried'?'⚑ Com o portador':state.mission.active?'⚑ Bandeira no chão':'⚑ Posição escolhida'}</div>`:'';const tag=targetable?'button':'div',timing=location.activeFromRound??loc+1;let result=home?'🏰 Ponto inicial da Bandeira':'Ataques exigem alvo no mesmo local';if(escape)result=defenders?'🔒 Fuga contestada por '+defenders:'🏁 Fuga livre para extração';return `<${tag} class="location-card ${active?'effect-active':'effect-dormant'} ${targetable?'targetable':''}" ${targetable?`onclick="handleLocationClick(${loc})"`:''}>${flag}<div class="loc-kicker">Campo ${loc+1} ${loc===1?'· Centro':''} ${home?'· Bastião':''} ${escape?'· Fuga':''}</div><div class="effect-state ${active?'':'dormant'}">${active?'Efeito ativo desde R'+timing:'Efeito adormecido · ativa na R'+timing}</div><div class="loc-icon">${data.icon}</div><div class="loc-name">${data.name}</div><div class="loc-effect">${data.effect}</div><div class="loc-score"><span class="red">⚔ ${locationPower(0,loc)}</span><span>×</span><span class="blue">⚔ ${locationPower(1,loc)}</span></div><div class="loc-result">${result}</div></${tag}>`;}
function renderSelectionBar(){if(!selection)return '';if(selection.type==='card'){const id=state.players[selection.pi].hand[selection.index],card=CARDS[id];return `<div class="selection-bar">🎯 <span><b>${esc(card.name)}</b>: escolha um local dourado. A carta resolve agora e o oponente responde.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}if(selection.type==='attack'){const unit=findUnit(selection.pi,selection.uid);return `<div class="selection-bar attack-mode">⚔️ <span><b>${esc(CARDS[unit.id].name)}</b>: escolha um inimigo destacado no mesmo local. A prévia mostra dano e contra-ataque.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}const unit=findUnit(selection.pi,selection.uid);return `<div class="selection-bar move-mode">🥾 <span><b>${esc(CARDS[unit.id].name)}</b>: escolha um local adjacente dourado. Mover exaure a unidade.</span><button class="btn" onclick="selection=null;render()">Cancelar</button></div>`;}

function renderMissionPanel(){
  const mission=state.mission;if(!mission.revealed)return `<section class="panel"><div class="panel-title">Missão da partida</div><div class="panel-body"><div class="mission-sealed"><div class="seal">?</div><b>Ordem lacrada</b><span>Será revelada na rodada 2. Os três campos já podem receber unidades.</span></div></div></section>`;
  const a=mission.attacker,d=mission.defender,stage=missionStage(),flag=mission.flag,steps=[['📜','Revelar'],['🏰','Escolher'],['⚑','Roubar'],['🏁','Extrair']];let alert=mission.home==null?'O Guardião está escolhendo publicamente uma das três posições.':'A Bandeira ativa na rodada 3.';let checklist='';
  if(mission.active&&flag.status==='ground'&&flag.loc===mission.home){const defenders=unitsAt(d,flag.loc).length;alert=defenders?'🔒 Roubo bloqueado: elimine ou remova '+defenders+' defensor(es) de '+slotLabel(flag.loc)+'.':'O Bastião está livre. Uma unidade pronta do Ladrão pode gastar a ação Roubar.';}
  else if(mission.active&&flag.status==='ground'){const thieves=unitsAt(a,flag.loc).length,guards=unitsAt(d,flag.loc).length;alert=(thieves&&guards)?'Bandeira contestada: nenhum lado pode interagir enquanto houver inimigos aqui.':guards?'O Guardião pode Recuperar quando sua unidade estiver pronta.':thieves?'O Ladrão pode retomar a Bandeira quando sua unidade estiver pronta.':'Bandeira caída e sem escolta.';}
  else if(mission.active&&flag.status==='carried'){const carrier=findUnit(a,flag.carrierUid),blockers=unitsAt(d,flag.loc).length,ready=carrier&&unitReady(carrier);if(flag.loc===mission.extraction){alert=blockers?'🔒 Extração bloqueada: elimine ou remova '+blockers+' inimigo(s) da fuga.':ready?'🏁 Fuga livre: o portador pode gastar a ação Extrair.':'O local está livre, mas o portador precisa estar pronto para Extrair.';checklist=`<div class="mission-checklist"><span class="ok">✓ Portador na fuga</span><span class="${ready?'ok':'blocked'}">${ready?'✓':'✗'} Portador pronto</span><span class="${blockers?'blocked':'ok'}">${blockers?'✗ '+blockers+' inimigo(s) presente(s)':'✓ Nenhum inimigo na fuga'}</span></div>`;}else alert=blockers?'🔒 Portador interceptado por '+blockers+' inimigo(s): não pode sair deste campo.':'O portador recebe −1 ATQ e pode se mover um campo adjacente por ação.';}
  return `<section class="panel"><div class="panel-title">O Estandarte Roubado</div><div class="panel-body"><div class="role-row"><div class="role-card"><small>Ladrão</small><b>${esc(state.players[a].name)}</b><span>Limpar, Roubar e Extrair</span></div><div class="role-card defend"><small>Guardião</small><b>${esc(state.players[d].name)}</b><span>Contestar, interceptar e Recuperar</span></div></div>${mission.home!=null?`<div class="chosen-home"><b>🏰 Bandeira:</b> ${esc(slotLabel(mission.home))}<br><b>🏁 Fuga:</b> ${esc(slotLabel(mission.extraction))}${state.overtime?'<br><b>⏳ Prorrogação ativa</b>':''}</div>`:''}<div class="mission-copy"><b>Regra de controle:</b> Roubar, Recuperar e Extrair exigem zero inimigos no local. O portador tem −1 ATQ, não pode ser movido por táticas e não sai de um campo contestado.</div><div class="mission-progress">${steps.map((s,i)=>`<div class="mission-step ${i<stage?'done':''} ${i===stage?'live':''}"><strong>${s[0]}</strong>${s[1]}</div>`).join('')}</div>${checklist}<div class="mission-alert">${alert}</div></div></section>`;
}
function renderInspectPanel(){if(!inspect)return `<section class="panel"><div class="panel-title">Leitura de carta</div><div class="panel-body inspect"><div class="inspect-empty">Selecione uma carta ou unidade. A interface mostra ATQ, modificadores, DEF atual/máxima, Escudo e estado.</div></div></section>`;const card=CARDS[inspect.id];let meta=card.type==='unit'?`⚔ ${card.attack} ATQ · 🛡 ${card.defense} DEF máxima · custo ${card.cost}`:`Tática · custo ${card.cost}`;let extra='';if(inspect.type==='unit'){const unit=findUnit(inspect.pi,inspect.uid);if(unit){meta=`⚔ ${attackValue(inspect.pi,unit)} ATQ · 🛡 ${defenseValue(unit)}/${maxDefense(unit)} DEF · ${unitReady(unit)?'Pronta':'Exausta'}`;extra=`<br><b>Cálculo do ATQ:</b> ${esc(attackBreakdown(inspect.pi,unit))}.<br>Dano persistente: ${maxDefense(unit)-unit.hp}. Escudo temporário: ${unit.shield||0}.${unit.nextCombatBonus?'<br>🔥 O bônus será consumido quando participar do próximo combate.':''}`;}}return `<section class="panel"><div class="panel-title">Leitura de carta</div><div class="panel-body inspect"><div class="inspect-head"><div class="inspect-icon">${card.icon}</div><div><b>${esc(card.name)}</b><span>${meta}</span></div></div><div class="inspect-text">${esc(card.text)}${extra}</div></div></section>`;}

function renderOverlay(){
  if(state.gameOver){const winner=state.gameOver.winner;return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">${winner==null?'⚖️':winner===state.mission.attacker?'⚑':'🏰'}</div><h2>${esc(state.gameOver.title)}</h2><p>${esc(state.gameOver.reason)}</p><p>Baixas finais: ${esc(state.players[0].name)} ${state.players[0].kills} × ${state.players[1].kills} ${esc(state.players[1].name)}</p><div class="btn-row"><button class="btn primary" onclick="resetGame()">Preparar novo teste</button></div></div></div>`;}
  if(state.phase==='disconnected')return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">🔌</div><h2>Partida pausada</h2><p>${esc(state.connectionLost||'A conexão foi encerrada.')} O estado foi congelado para evitar versões divergentes.</p><div class="btn-row"><button class="btn" onclick="resetGame()">Voltar ao início</button></div></div></div>`;
  if(state.phase==='flag-choice'){const d=state.mission.defender,can=canChooseFlag(d);return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">⚑</div><h2>Onde proteger a Bandeira?</h2><p><b>${esc(state.players[d].name)}</b>, o Guardião, escolhe publicamente um campo. Todos os locais são conhecidos; seus efeitos despertam em R1, R2 e R3.</p><div class="flag-choice-grid">${[0,1,2].map(loc=>`<button class="flag-choice" onclick="chooseFlag(${d},${loc})" ${!can?'disabled':''}><span>${loc===0?'Ⅰ':loc===1?'Ⅱ':'Ⅲ'}</span>${esc(slotLabel(loc))}<small>${locationEffectActive(loc)?'efeito ativo':'efeito ativa na R'+(state.locations[loc].activeFromRound??loc+1)}</small></button>`).join('')}</div><p>${can?'A escolha e a rota oposta aparecerão no tabuleiro e na Linha de Ações.':'Aguardando o Guardião escolher…'}</p></div></div>`;}
  if(state.passPending)return `<div class="overlay"><div class="overlay-card"><div class="overlay-emblem">🕯️</div><h2>Passe o dispositivo</h2><p>Agora é a ação de <b>${esc(state.players[state.vezLocal].name)}</b>.</p><div class="btn-row"><button class="btn primary" onclick="confirmPass()">Sou eu, continuar</button></div></div></div>`;
  return '';
}

render();
</script>
</body>
</html>
